s or contains invalid hex digits\n    pub fn from_hex(hex: \u0026str) -\u003e Result\u003cSelf\u003e {\n        let hex = hex.trim_start_matches('#');\n\n        if hex.len() != 6 {\n            anyhow::bail!(\"Invalid hex color: must be 6 characters\");\n        }\n\n        let r = u8::from_str_radix(\u0026hex[0..2], 16).context(\"Invalid red component\")?;\n        let g = u8::from_str_radix(\u0026hex[2..4], 16).context(\"Invalid green component\")?;\n        let b = u8::from_str_radix(\u0026hex[4..6], 16).context(\"Invalid blue component\")?;\n\n        Ok(Self::new(r, g, b))\n    }\n\n    /// Convert to hex string\n    #[must_use]\n    pub fn to_hex(self) -\u003e String {\n        // Pre-allocate exact capacity: 7 bytes for #RRGGBB\n        let mut s = String::with_capacity(7);\n        use std::fmt::Write;\n        let _ = write!(s, \"#{:02X}{:02X}{:02X}\", self.r, self.g, self.b);\n        s\n    }\n\n    /// Convert to ANSI escape sequence for foreground\n    #[must_use]\n    pub fn to_ansi_fg(self) -\u003e String {\n        // Pre-allocate for typical sequence: \\x1b[38;2;RRR;GGG;BBBm (max ~19 bytes)\n        let mut s = String::with_capacity(20);\n        use std::fmt::Write;\n        let _ = write!(s, \"\\x1b[38;2;{};{};{}m\", self.r, self.g, self.b);\n        s\n    }\n\n    /// Convert to ANSI escape sequence for background\n    #[must_use]\n    pub fn to_ansi_bg(self) -\u003e String {\n        // Pre-allocate for typical sequence: \\x1b[48;2;RRR;GGG;BBBm (max ~19 bytes)\n        let mut s = String::with_capacity(20);\n        use std::fmt::Write;\n        let _ = write!(s, \"\\x1b[48;2;{};{};{}m\", self.r, self.g, self.b);\n        s\n    }\n\n    /// Blend two colors together using linear interpolation\n    ///\n    /// This function performs color blending with sub-pixel accuracy using\n    /// proper rounding. It's optimized to use FMA (Fused Multiply-Add) when\n    /// available on the CPU for better performance.\n    ///\n    /// # Arguments\n    /// * `other` - The color to blend with\n    /// * `factor` - Blend factor (0.0 = all self, 1.0 = all other)\n    ///\n    /// # Returns\n    /// Blended color\n    ///\n    /// # Formula\n    /// `result = self * (1 - factor) + other * factor`\n    ///\n    /// # Example\n    /// ```ignore\n    /// let red = TrueColor::new(255, 0, 0);\n    /// let blue = TrueColor::new(0, 0, 255);\n    /// let purple = red.blend(blue, 0.5);  // 50% blend = purple\n    /// ```\n    #[allow(clippy::cast_possible_truncation, clippy::cast_sign_loss)]\n    #[must_use]\n    pub fn blend(self, other: Self, factor: f32) -\u003e Self {\n        let factor = factor.clamp(0.0, 1.0);\n        Self {\n            // Use mul_add for efficient FMA (Fused Multiply-Add) instruction\n            // Formula: self * (1 - factor) + other * factor\n            // Restructured as: (other - self) * factor + self for proper FMA usage\n            // Note: Casts are safe because we clamp factor and round before casting\n            r: (f32::from(other.r) - f32::from(self.r))\n                .mul_add(factor, f32::from(self.r))\n                .round() as u8,\n            g: (f32::from(other.g) - f32::from(self.g))\n                .mul_add(factor, f32::from(self.g))\n                .round() as u8,\n            b: (f32::from(other.b) - f32::from(self.b))\n                .mul_add(factor, f32::from(self.b))\n                .round() as u8,\n        }\n    }\n\n    /// Lighten color by factor\n    #[must_use]\n    pub fn lighten(self, factor: f32) -\u003e Self {\n        let white = Self::new(255, 255, 255);\n        self.blend(white, factor)\n    }\n\n    /// Darken color by factor\n    #[must_use]\n    pub fn darken(self, factor: f32) -\u003e Self {\n        let black = Self::new(0, 0, 0);\n        self.blend(black, factor)\n    }\n\n    /// Get luminance (0.0 - 1.0)\n    #[must_use]\n    pub fn luminance(self) -\u003e f32 {\n        // Use nested mul_add for hardware FMA (Fused Multiply-Add) optimization\n        // Original formula: (0.299*r + 0.587*g + 0.114*b) / 255.0\n        // Nested as: 0.299*r + (0.587*g + (0.114*b + 0.0))\n        // This leverages single-instruction FMA on modern CPUs for better performance and accuracy\n        // Trade-off: slightly reduced readability for measurable performance gains in tight loops\n        0.299f32.mul_add(\n            f32::from(self.r),\n            0.587f32.mul_add(f32::from(self.g), 0.114f32.mul_add(f32::from(self.b), 0.0)),\n        ) / 255.0\n    }\n\n    /// Check if color is light\n    #[must_use]\n    pub fn is_light(self) -\u003e bool {\n        self.luminance() \u003e 0.5\n    }\n}\n\nimpl fmt::Display for TrueColor {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"{}\", self.to_hex())\n    }\n}\n\n/// Color palette with 24-bit color support\n#[derive(Debug, Clone)]\npub struct TrueColorPalette {\n    // ANSI colors (16 colors)\n    pub black: TrueColor,\n    pub red: TrueColor,\n    pub green: TrueColor,\n    pub yellow: TrueColor,\n    pub blue: TrueColor,\n    pub magenta: TrueColor,\n    pub cyan: TrueColor,\n    pub white: TrueColor,\n\n    pub bright_black: TrueColor,\n    pub bright_red: TrueColor,\n    pub bright_green: TrueColor,\n    pub bright_yellow: TrueColor,\n    pub bright_blue: TrueColor,\n    pub bright_magenta: TrueColor,\n    pub bright_cyan: TrueColor,\n    pub bright_white: TrueColor,\n\n    // Extended 256 color palette\n    pub extended: Vec\u003cTrueColor\u003e,\n}\n\nimpl TrueColorPalette {\n    /// Create default dark palette with cool red/black theme (no runtime unwrap/panic)\n    #[must_use]\n    pub fn default_dark() -\u003e Self {\n        // Use const values - these are compile-time verified, no runtime unwrap needed\n        Self {\n            black: TrueColor::new(0x00, 0x00, 0x00),   // #000000\n            red: TrueColor::new(0xCC, 0x55, 0x55),     // #CC5555 - Darker, cooler red\n            green: TrueColor::new(0x5A, 0x8A, 0x6A),   // #5A8A6A - Muted green\n            yellow: TrueColor::new(0xB8, 0x98, 0x60),  // #B89860 - Darker yellow\n            blue: TrueColor::new(0x6A, 0x7A, 0x9A),    // #6A7A9A - Cool blue-gray\n            magenta: TrueColor::new(0xB0, 0x5A, 0x7A), // #B05A7A - Dark magenta-red\n            cyan: TrueColor::new(0x5A, 0x8A, 0x8A),    // #5A8A8A - Dark teal\n            white: TrueColor::new(0xC0, 0xB0, 0xB0),   // #C0B0B0 - Slightly reddish gray\n\n            bright_black: TrueColor::new(0x3A, 0x2A, 0x2A), // #3A2A2A - Dark reddish-gray\n            bright_red: TrueColor::new(0xDD, 0x66, 0x66),   // #DD6666 - Medium cool red\n            bright_green: TrueColor::new(0x6A, 0x9A, 0x7A), // #6A9A7A - Muted bright green\n            bright_yellow: TrueColor::new(0xC8, 0xA8, 0x70), // #C8A870 - Muted gold\n            bright_blue: TrueColor::new(0x7A, 0x8A, 0xAA),  // #7A8AAA - Cool light blue\n            bright_magenta: TrueColor::new(0xC0, 0x6A, 0x8A), // #C06A8A - Bright magenta-red\n            bright_cyan: TrueColor::new(0x6A, 0x9A, 0x9A),  // #6A9A9A - Muted cyan\n            bright_white: TrueColor::new(0xD0, 0xC0, 0xC0), // #D0C0C0 - Light reddish-gray\n\n            extended: Self::generate_256_palette(),\n        }\n    }\n\n    /// Create palette from theme config's AnsiColors\n    ///\n    /// # Errors\n    /// Returns an error if any color string is not a valid hex color\n    pub fn from_ansi_colors(colors: \u0026crate::config::AnsiColors) -\u003e Result\u003cSelf\u003e {\n        Ok(Self {\n            black: TrueColor::from_hex(\u0026colors.black)?,\n            red: TrueColor::from_hex(\u0026colors.red)?,\n            green: TrueColor::from_hex(\u0026colors.green)?,\n            yellow: TrueColor::from_hex(\u0026colors.yellow)?,\n            blue: TrueColor::from_hex(\u0026colors.blue)?,\n            magenta: TrueColor::from_hex(\u0026colors.magenta)?,\n            cyan: TrueColor::from_hex(\u0026colors.cyan)?,\n            white: TrueColor::from_hex(\u0026colors.white)?,\n            bright_black: TrueColor::from_hex(\u0026colors.bright_black)?,\n            bright_red: TrueColor::from_hex(\u0026colors.bright_red)?,\n            bright_green: TrueColor::from_hex(\u0026colors.bright_green)?,\n            bright_yellow: TrueColor::from_hex(\u0026colors.bright_yellow)?,\n            bright_blue: TrueColor::from_hex(\u0026colors.bright_blue)?,\n            bright_magenta: TrueColor::from_hex(\u0026colors.bright_magenta)?,\n            bright_cyan: TrueColor::from_hex(\u0026colors.bright_cyan)?,\n            bright_white: TrueColor::from_hex(\u0026colors.bright_white)?,\n            extended: Self::generate_256_palette(),\n        })\n    }\n\n    /// Generate 256 color palette (for xterm compatibility)\n    fn generate_256_palette() -\u003e Vec\u003cTrueColor\u003e {\n        let mut palette = Vec::with_capacity(256);\n\n        // First 16 colors are the standard ANSI colors (handled separately)\n        for _ in 0..16 {\n            palette.push(TrueColor::new(0, 0, 0));\n        }\n\n        // 216 color cube (6x6x6)\n        for r in 0..6 {\n            for g in 0..6 {\n                for b in 0..6 {\n                    let r_val = if r \u003e 0 { r * 40 + 55 } else { 0 };\n                    let g_val = if g \u003e 0 { g * 40 + 55 } else { 0 };\n                    let b_val = if b \u003e 0 { b * 40 + 55 } else { 0 };\n                    palette.push(TrueColor::new(r_val, g_val, b_val));\n                }\n            }\n        }\n\n        // 24 grayscale colors\n        for i in 0..24 {\n            let gray = i * 10 + 8;\n            palette.push(TrueColor::new(gray, gray, gray));\n        }\n\n        palette\n    }\n\n    /// Get color by 256-color index (optimized with inline and match)\n    #[must_use]\n    #[inline]\n    pub fn get_256(\u0026self, index: u8) -\u003e TrueColor {\n        match index {\n            0 =\u003e self.black,\n            1 =\u003e self.red,\n            2 =\u003e self.green,\n            3 =\u003e self.yellow,\n            4 =\u003e self.blue,\n            5 =\u003e self.magenta,\n            6 =\u003e self.cyan,\n            7 =\u003e self.white,\n            8 =\u003e self.bright_black,\n            9 =\u003e self.bright_red,\n            10 =\u003e self.bright_green,\n            11 =\u003e self.bright_yellow,\n            12 =\u003e self.bright_blue,\n            13 =\u003e self.bright_magenta,\n            14 =\u003e self.bright_cyan,\n            15 =\u003e self.bright_white,\n            i =\u003e self\n                .extended\n                .get(usize::from(i))\n                .copied()\n                .unwrap_or(TrueColor::new(0, 0, 0)),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_true_color_from_hex() {\n        let color = TrueColor::from_hex(\"#FF8800\").unwrap();\n        assert_eq!(color.r, 255);\n        assert_eq!(color.g, 136);\n        assert_eq!(color.b, 0);\n    }\n\n    #[test]\n    fn test_true_color_from_hex_without_hash() {\n        let color = TrueColor::from_hex(\"FF8800\").unwrap();\n        assert_eq!(color.r, 255);\n        assert_eq!(color.g, 136);\n        assert_eq!(color.b, 0);\n    }\n\n    #[test]\n    fn test_true_color_from_hex_invalid_length() {\n        let result = TrueColor::from_hex(\"FFF\");\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_true_color_from_hex_invalid_chars() {\n        let result = TrueColor::from_hex(\"GGGGGG\");\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_true_color_to_hex() {\n        let color = TrueColor::new(255, 136, 0);\n        assert_eq!(color.to_hex(), \"#FF8800\");\n    }\n\n    #[test]\n    fn test_ansi_sequences() {\n        let color = TrueColor::new(255, 0, 0);\n        assert_eq!(color.to_ansi_fg(), \"\\x1b[38;2;255;0;0m\");\n        assert_eq!(color.to_ansi_bg(), \"\\x1b[48;2;255;0;0m\");\n    }\n\n    #[test]\n    fn test_color_blending() {\n        let red = TrueColor::new(255, 0, 0);\n        let blue = TrueColor::new(0, 0, 255);\n        let purple = red.blend(blue, 0.5);\n\n        // With rounding: 255 * 0.5 = 127.5 -\u003e rounds to 128\n        assert_eq!(purple.r, 128);\n        assert_eq!(purple.b, 128);\n    }\n\n    #[test]\n    fn test_color_blending_clamp() {\n        let red = TrueColor::new(255, 0, 0);\n        let blue = TrueColor::new(0, 0, 255);\n\n        // Factor clamped to 0.0\n        let result = red.blend(blue, -1.0);\n        assert_eq!(result.r, 255);\n        assert_eq!(result.b, 0);\n\n        // Factor clamped to 1.0\n        let result = red.blend(blue, 2.0);\n        assert_eq!(result.r, 0);\n        assert_eq!(result.b, 255);\n    }\n\n    #[test]\n    fn test_luminance() {\n        let white = TrueColor::new(255, 255, 255);\n        let black = TrueColor::new(0, 0, 0);\n\n        assert!(white.is_light());\n        assert!(!black.is_light());\n    }\n\n    #[test]\n    fn test_luminance_values() {\n        let white = TrueColor::new(255, 255, 255);\n        let black = TrueColor::new(0, 0, 0);\n\n        assert!((white.luminance() - 1.0).abs() \u003c 0.01);\n        assert!((black.luminance() - 0.0).abs() \u003c 0.01);\n    }\n\n    #[test]\n    fn test_lighten() {\n        let dark = TrueColor::new(100, 100, 100);\n        let lighter = dark.lighten(0.5);\n        assert!(lighter.r \u003e dark.r);\n        assert!(lighter.g \u003e dark.g);\n        assert!(lighter.b \u003e dark.b);\n    }\n\n    #[test]\n    fn test_darken() {\n        let light = TrueColor::new(200, 200, 200);\n        let darker = light.darken(0.5);\n        assert!(darker.r \u003c light.r);\n        assert!(darker.g \u003c light.g);\n        assert!(darker.b \u003c light.b);\n    }\n\n    #[test]\n    fn test_display_trait() {\n        let color = TrueColor::new(255, 0, 128);\n        assert_eq!(format!(\"{}\", color), \"#FF0080\");\n    }\n\n    #[test]\n    fn test_palette_default_dark() {\n        let palette = TrueColorPalette::default_dark();\n        assert_eq!(palette.black, TrueColor::new(0, 0, 0));\n        assert_eq!(palette.extended.len(), 256);\n    }\n\n    #[test]\n    fn test_palette_get_256_standard_colors() {\n        let palette = TrueColorPalette::default_dark();\n        assert_eq!(palette.get_256(0), palette.black);\n        assert_eq!(palette.get_256(1), palette.red);\n        assert_eq!(palette.get_256(7), palette.white);\n        assert_eq!(palette.get_256(8), palette.bright_black);\n        assert_eq!(palette.get_256(15), palette.bright_white);\n    }\n\n    #[test]\n    fn test_palette_get_256_extended() {\n        let palette = TrueColorPalette::default_dark();\n        // Test some extended colors (16-255)\n        let color = palette.get_256(16);\n        assert!(color.r == 0 || color.g == 0 || color.b == 0); // First cube color is 0,0,0\n\n        // Test grayscale range\n        let gray = palette.get_256(232);\n        assert!(gray.r == gray.g \u0026\u0026 gray.g == gray.b);\n    }\n\n    #[test]\n    fn test_palette_get_256_out_of_range() {\n        let palette = TrueColorPalette::default_dark();\n        // Index 255 is valid (last grayscale)\n        let _ = palette.get_256(255);\n    }\n\n    #[test]\n    fn test_from_ansi_colors() {\n        use crate::config::AnsiColors;\n        let ansi_colors = AnsiColors {\n            black: \"#000000\".to_string(),\n            red: \"#FF0000\".to_string(),\n            green: \"#00FF00\".to_string(),\n            yellow: \"#FFFF00\".to_string(),\n            blue: \"#0000FF\".to_string(),\n            magenta: \"#FF00FF\".to_string(),\n            cyan: \"#00FFFF\".to_string(),\n            white: \"#FFFFFF\".to_string(),\n            bright_black: \"#808080\".to_string(),\n            bright_red: \"#FF8080\".to_string(),\n            bright_green: \"#80FF80\".to_string(),\n            bright_yellow: \"#FFFF80\".to_string(),\n            bright_blue: \"#8080FF\".to_string(),\n            bright_magenta: \"#FF80FF\".to_string(),\n            bright_cyan: \"#80FFFF\".to_string(),\n            bright_white: \"#FFFFFF\".to_string(),\n        };\n\n        let palette = TrueColorPalette::from_ansi_colors(\u0026ansi_colors).unwrap();\n        assert_eq!(palette.black, TrueColor::new(0, 0, 0));\n        assert_eq!(palette.red, TrueColor::new(255, 0, 0));\n    }\n}\n","traces":[{"line":23,"address":[6042816],"length":1,"stats":{"Line":4}},{"line":24,"address":[6042831],"length":1,"stats":{"Line":4}},{"line":26,"address":[6207920],"length":1,"stats":{"Line":4}},{"line":27,"address":[6102515],"length":1,"stats":{"Line":2}},{"line":30,"address":[6102362,6102191],"length":1,"stats":{"Line":6}},{"line":31,"address":[7090047,7090192],"length":1,"stats":{"Line":4}},{"line":32,"address":[6043020,6043159],"length":1,"stats":{"Line":4}},{"line":34,"address":[7090113],"length":1,"stats":{"Line":4}},{"line":39,"address":[7089248,7089625],"length":1,"stats":{"Line":2}},{"line":43,"address":[7089351],"length":1,"stats":{"Line":2}},{"line":44,"address":[7089487],"length":1,"stats":{"Line":2}},{"line":49,"address":[6206670,6206304],"length":1,"stats":{"Line":2}},{"line":53,"address":[6206407],"length":1,"stats":{"Line":2}},{"line":54,"address":[6041459],"length":1,"stats":{"Line":2}},{"line":59,"address":[7087920,7088285],"length":1,"stats":{"Line":2}},{"line":63,"address":[6206023],"length":1,"stats":{"Line":2}},{"line":64,"address":[7088147],"length":1,"stats":{"Line":2}},{"line":91,"address":[7088720],"length":1,"stats":{"Line":1}},{"line":98,"address":[5975684,5975716],"length":1,"stats":{"Line":2}},{"line":101,"address":[6206882,6207140,6207753,6207772,6207805,6206867,6207121,6207170],"length":1,"stats":{"Line":2}},{"line":104,"address":[6207809,6207174,6206945,6207831,6207196,6206927],"length":1,"stats":{"Line":2}},{"line":112,"address":[7089632],"length":1,"stats":{"Line":0}},{"line":119,"address":[6207008],"length":1,"stats":{"Line":0}},{"line": workspaces","furnace","src","config","mod.rs"],"content":"use anyhow::{Context, Result};\nuse mlua::{Lua, Table};\nuse std::collections::HashMap;\nuse std::fs;\nuse std::path::{Path, PathBuf};\n\nconst DEFAULT_CONFIG_LUA: \u0026str = include_str!(\"../../config.default.lua\");\n\n/// Main configuration structure with zero-copy design for performance\n#[derive(Debug, Clone, Default)]\npub struct Config {\n    pub shell: ShellConfig,\n    pub terminal: TerminalConfig,\n    pub theme: ThemeConfig,\n    pub keybindings: KeyBindings,\n    pub features: FeaturesConfig,\n    pub hooks: HooksConfig,\n}\n\n#[derive(Debug, Clone, Default)]\npub struct HooksConfig {\n    /// Lua script paths for various hooks\n    pub on_startup: Option\u003cString\u003e,\n    pub on_shutdown: Option\u003cString\u003e,\n    pub on_key_press: Option\u003cString\u003e,\n    pub on_command_start: Option\u003cString\u003e,\n    pub on_command_end: Option\u003cString\u003e,\n    pub on_output: Option\u003cString\u003e,\n    pub on_bell: Option\u003cString\u003e,\n    pub on_title_change: Option\u003cString\u003e,\n\n    /// Custom keybinding handlers (key -\u003e lua function string)\n    pub custom_keybindings: HashMap\u003cString, String\u003e,\n\n    /// Output filters (Lua functions that transform output)\n    pub output_filters: Vec\u003cString\u003e,\n\n    /// Custom widgets (Lua code for rendering custom UI)\n    pub custom_widgets: Vec\u003cString\u003e,\n}\n\nimpl HooksConfig {\n    fn from_lua_table(table: \u0026Table) -\u003e Result\u003cSelf\u003e {\n        let on_startup = table.get::\u003c_, Option\u003cString\u003e\u003e(\"on_startup\")?;\n        let on_shutdown = table.get::\u003c_, Option\u003cString\u003e\u003e(\"on_shutdown\")?;\n        let on_key_press = table.get::\u003c_, Option\u003cString\u003e\u003e(\"on_key_press\")?;\n        let on_command_start = table.get::\u003c_, Option\u003cString\u003e\u003e(\"on_command_start\")?;\n        let on_command_end = table.get::\u003c_, Option\u003cString\u003e\u003e(\"on_command_end\")?;\n        let on_output = table.get::\u003c_, Option\u003cString\u003e\u003e(\"on_output\")?;\n        let on_bell = table.get::\u003c_, Option\u003cString\u003e\u003e(\"on_bell\")?;\n        let on_title_change = table.get::\u003c_, Option\u003cString\u003e\u003e(\"on_title_change\")?;\n\n        let custom_keybindings = if let Ok(kb_table) = table.get::\u003c_, Table\u003e(\"custom_keybindings\") {\n            let mut map = HashMap::new();\n            for pair in kb_table.pairs::\u003cString, String\u003e() {\n                let (key, func) = pair?;\n                map.insert(key, func);\n            }\n            map\n        } else {\n            HashMap::new()\n        };\n\n        let output_filters = if let Ok(filters_table) = table.get::\u003c_, Table\u003e(\"output_filters\") {\n            let mut filters = Vec::new();\n            for pair in filters_table.sequence_values::\u003cString\u003e() {\n                filters.push(pair?);\n            }\n            filters\n        } else {\n            Vec::new()\n        };\n\n        let custom_widgets = if let Ok(widgets_table) = table.get::\u003c_, Table\u003e(\"custom_widgets\") {\n            let mut widgets = Vec::new();\n            for pair in widgets_table.sequence_values::\u003cString\u003e() {\n                widgets.push(pair?);\n            }\n            widgets\n        } else {\n            Vec::new()\n        };\n\n        Ok(Self {\n            on_startup,\n            on_shutdown,\n            on_key_press,\n            on_command_start,\n            on_command_end,\n            on_output,\n            on_bell,\n            on_title_change,\n            custom_keybindings,\n            output_filters,\n            custom_widgets,\n        })\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct ShellConfig {\n    pub default_shell: String,\n    /// Environment variables to pass to shell (future feature)\n    pub env: HashMap\u003cString, String\u003e,\n    pub working_dir: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct TerminalConfig {\n    /// Maximum command history entries (memory-efficient circular buffer) - future feature\n    pub max_history: usize,\n\n    /// Enable tabs for multiple sessions\n    pub enable_tabs: bool,\n\n    /// Enable split panes - future feature\n    pub enable_split_pane: bool,\n\n    /// Font size - parsed for future rendering integration\n    pub font_size: u16,\n\n    /// Cursor style: block, underline, bar - future feature\n    pub cursor_style: String,\n\n    /// Number of scrollback lines (memory-mapped for large buffers)\n    pub scrollback_lines: usize,\n\n    /// Hardware acceleration for rendering - future GPU feature flag\n    pub hardware_acceleration: bool,\n}\n\n#[derive(Debug, Clone)]\npub struct ThemeConfig {\n    pub name: String,\n    pub foreground: String,\n    pub background: String,\n    pub cursor: String,\n    pub selection: String,\n    pub colors: AnsiColors,\n    pub background_image: Option\u003cBackgroundConfig\u003e,\n    pub cursor_trail: Option\u003cCursorTrailConfig\u003e,\n}\n\n/// Background configuration for background image support\n#[derive(Debug, Clone)]\npub struct BackgroundConfig {\n    /// Path to background image file (supports PNG, JPEG, etc.)\n    pub image_path: Option\u003cString\u003e,\n    /// Solid color as fallback or alternative\n    pub color: Option\u003cString\u003e,\n    /// Opacity/transparency (0.0 = fully transparent, 1.0 = fully opaque)\n    pub opacity: f32,\n    /// How the image should be displayed: \"fill\", \"fit\", \"stretch\", \"tile\", \"center\"\n    pub mode: String,\n    /// Blur effect strength (0.0 = no blur, higher = more blur)\n    pub blur: f32,\n}\n\n/// Cursor trail configuration for cursor effects\n#[derive(Debug, Clone)]\npub struct CursorTrailConfig {\n    /// Enable cursor trail effect\n    pub enabled: bool,\n    /// Length of the trail (number of past positions to show)\n    pub length: usize,\n    /// Trail color (with alpha channel support like \"#RRGGBBAA\")\n    pub color: String,\n    /// Fade mode: \"linear\", \"exponential\", \"smooth\"\n    pub fade_mode: String,\n    /// Trail width (multiplier of cursor size)\n    pub width: f32,\n    /// Animation speed (milliseconds per trail update)\n    pub animation_speed: u64,\n}\n\n/// ANSI colors configuration for theme customization\n#[derive(Debug, Clone)]\npub struct AnsiColors {\n    pub black: String,\n    pub red: String,\n    pub green: String,\n    pub yellow: String,\n    pub blue: String,\n    pub magenta: String,\n    pub cyan: String,\n    pub white: String,\n    pub bright_black: String,\n    pub bright_red: String,\n    pub bright_green: String,\n    pub bright_yellow: String,\n    pub bright_blue: String,\n    pub bright_magenta: String,\n    pub bright_cyan: String,\n    pub bright_white: String,\n}\n\n/// Keybinding configuration for custom keybinding loading\n#[derive(Debug, Clone)]\npub struct KeyBindings {\n    pub new_tab: String,\n    pub close_tab: String,\n    pub next_tab: String,\n    pub prev_tab: String,\n    pub split_vertical: String,\n    pub split_horizontal: String,\n    pub copy: String,\n    pub paste: String,\n    pub search: String,\n    pub clear: String,\n}\n\n#[derive(Debug, Clone, Default)]\n#[allow(clippy::struct_excessive_bools)]\npub struct FeaturesConfig {\n    /// Enable resource monitor (Ctrl+R)\n    pub resource_monitor: bool,\n    /// Enable autocomplete suggestions\n    pub autocomplete: bool,\n    /// Enable progress bar for long-running commands\n    pub progress_bar: bool,\n    /// Enable session save/restore\n    pub session_manager: bool,\n    /// Enable theme manager for theme switching\n    pub theme_manager: bool,\n    /// Enable command palette\n    pub command_palette: bool,\n}\n\nimpl FeaturesConfig {\n    fn from_lua_table(table: \u0026Table) -\u003e Result\u003cSelf\u003e {\n        Ok(Self {\n            resource_monitor: table\n                .get::\u003c_, Option\u003cbool\u003e\u003e(\"resource_monitor\")?\n                .unwrap_or(false),\n            autocomplete: table\n                .get::\u003c_, Option\u003cbool\u003e\u003e(\"autocomplete\")?\n                .unwrap_or(false),\n            progress_bar: table\n                .get::\u003c_, Option\u003cbool\u003e\u003e(\"progress_bar\")?\n                .unwrap_or(false),\n            session_manager: table\n                .get::\u003c_, Option\u003cbool\u003e\u003e(\"session_manager\")?\n                .unwrap_or(false),\n            theme_manager: table\n                .get::\u003c_, Option\u003cbool\u003e\u003e(\"theme_manager\")?\n                .unwrap_or(false),\n            command_palette: table\n                .get::\u003c_, Option\u003cbool\u003e\u003e(\"command_palette\")?\n                .unwrap_or(false),\n        })\n    }\n}\n\nimpl Default for ShellConfig {\n    fn default() -\u003e Self {\n        Self {\n            default_shell: detect_default_shell(),\n            env: HashMap::new(),\n            working_dir: None,\n        }\n    }\n}\n\nimpl Default for TerminalConfig {\n    fn default() -\u003e Self {\n        Self {\n            max_history: 10000,\n            enable_tabs: false,\n            enable_split_pane: false,\n            font_size: 12,\n            cursor_style: \"block\".to_string(),\n            scrollback_lines: 10000,\n            hardware_acceleration: true,\n        }\n    }\n}\n\nimpl ShellConfig {\n    fn from_lua_table(table: \u0026Table) -\u003e Result\u003cSelf\u003e {\n        let default_shell = table\n            .get::\u003c_, Option\u003cString\u003e\u003e(\"default_shell\")?\n            .unwrap_or_else(detect_default_shell);\n\n        let env = if let Ok(env_table) = table.get::\u003c_, Table\u003e(\"env\") {\n            let mut map = HashMap::new();\n            for pair in env_table.pairs::\u003cString, String\u003e() {\n                let (key, value) = pair?;\n                map.insert(key, value);\n            }\n            map\n        } else {\n            HashMap::new()\n        };\n\n        let working_dir = table.get::\u003c_, Option\u003cString\u003e\u003e(\"working_dir\")?;\n\n        Ok(Self {\n            default_shell,\n            env,\n            working_dir,\n        })\n    }\n}\n\nimpl TerminalConfig {\n    fn from_lua_table(table: \u0026Table) -\u003e Result\u003cSelf\u003e {\n        Ok(Self {\n            max_history: table\n                .get::\u003c_, Option\u003cusize\u003e\u003e(\"max_history\")?\n                .unwrap_or(10000),\n            enable_tabs: table\n                .get::\u003c_, Option\u003cbool\u003e\u003e(\"enable_tabs\")?\n                .unwrap_or(false),\n            enable_split_pane: table\n                .get::\u003c_, Option\u003cbool\u003e\u003e(\"enable_split_pane\")?\n                .unwrap_or(false),\n            font_size: table.get::\u003c_, Option\u003cu16\u003e\u003e(\"font_size\")?.unwrap_or(12),\n            cursor_style: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"cursor_style\")?\n                .unwrap_or_else(|| \"block\".to_string()),\n            scrollback_lines: table\n                .get::\u003c_, Option\u003cusize\u003e\u003e(\"scrollback_lines\")?\n                .unwrap_or(10000),\n            hardware_acceleration: table\n                .get::\u003c_, Option\u003cbool\u003e\u003e(\"hardware_acceleration\")?\n                .unwrap_or(true),\n        })\n    }\n}\n\nimpl Default for ThemeConfig {\n    fn default() -\u003e Self {\n        Self {\n            name: \"default\".to_string(),\n            foreground: \"#FFFFFF\".to_string(),\n            background: \"#1E1E1E\".to_string(),\n            cursor: \"#00FF00\".to_string(),\n            selection: \"#264F78\".to_string(),\n            colors: AnsiColors::default(),\n            background_image: None,\n            cursor_trail: None,\n        }\n    }\n}\n\nimpl Default for BackgroundConfig {\n    fn default() -\u003e Self {\n        Self {\n            image_path: None,\n            color: None,\n            opacity: 1.0,\n            mode: \"fill\".to_string(),\n            blur: 0.0,\n        }\n    }\n}\n\nimpl Default for CursorTrailConfig {\n    fn default() -\u003e Self {\n        Self {\n            enabled: false,\n            length: 10,\n            color: \"#00FF0080\".to_string(),\n            fade_mode: \"exponential\".to_string(),\n            width: 1.0,\n            animation_speed: 16,\n        }\n    }\n}\n\nimpl BackgroundConfig {\n    fn from_lua_table(table: \u0026Table) -\u003e Result\u003cSelf\u003e {\n        Ok(Self {\n            image_path: table.get::\u003c_, Option\u003cString\u003e\u003e(\"image_path\")?,\n            color: table.get::\u003c_, Option\u003cString\u003e\u003e(\"color\")?,\n            opacity: table\n                .get::\u003c_, Option\u003cf32\u003e\u003e(\"opacity\")?\n                .unwrap_or(1.0)\n                .clamp(0.0, 1.0),\n            mode: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"mode\")?\n                .unwrap_or_else(|| \"fill\".to_string()),\n            blur: table.get::\u003c_, Option\u003cf32\u003e\u003e(\"blur\")?.unwrap_or(0.0).max(0.0),\n        })\n    }\n}\n\nimpl CursorTrailConfig {\n    fn from_lua_table(table: \u0026Table) -\u003e Result\u003cSelf\u003e {\n        Ok(Self {\n            enabled: table.get::\u003c_, Option\u003cbool\u003e\u003e(\"enabled\")?.unwrap_or(false),\n            length: table.get::\u003c_, Option\u003cusize\u003e\u003e(\"length\")?.unwrap_or(10),\n            color: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"color\")?\n                .unwrap_or_else(|| \"#00FF0080\".to_string()),\n            fade_mode: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"fade_mode\")?\n                .unwrap_or_else(|| \"exponential\".to_string()),\n            width: table.get::\u003c_, Option\u003cf32\u003e\u003e(\"width\")?.unwrap_or(1.0),\n            animation_speed: table\n                .get::\u003c_, Option\u003cu64\u003e\u003e(\"animation_speed\")?\n                .unwrap_or(16),\n        })\n    }\n}\n\nimpl ThemeConfig {\n    fn from_lua_table(table: \u0026Table) -\u003e Result\u003cSelf\u003e {\n        let name = table\n            .get::\u003c_, Option\u003cString\u003e\u003e(\"name\")?\n            .unwrap_or_else(|| \"default\".to_string());\n        let foreground = table\n            .get::\u003c_, Option\u003cString\u003e\u003e(\"foreground\")?\n            .unwrap_or_else(|| \"#FFFFFF\".to_string());\n        let background = table\n            .get::\u003c_, Option\u003cString\u003e\u003e(\"background\")?\n            .unwrap_or_else(|| \"#1E1E1E\".to_string());\n        let cursor = table\n            .get::\u003c_, Option\u003cString\u003e\u003e(\"cursor\")?\n            .unwrap_or_else(|| \"#00FF00\".to_string());\n        let selection = table\n            .get::\u003c_, Option\u003cString\u003e\u003e(\"selection\")?\n            .unwrap_or_else(|| \"#264F78\".to_string());\n\n        let colors = if let Ok(colors_table) = table.get::\u003c_, Table\u003e(\"colors\") {\n            AnsiColors::from_lua_table(\u0026colors_table)?\n        } else {\n            AnsiColors::default()\n        };\n\n        let background_image = if let Ok(bg_table) = table.get::\u003c_, Table\u003e(\"background_image\") {\n            Some(BackgroundConfig::from_lua_table(\u0026bg_table)?)\n        } else {\n            None\n        };\n\n        let cursor_trail = if let Ok(trail_table) = table.get::\u003c_, Table\u003e(\"cursor_trail\") {\n            Some(CursorTrailConfig::from_lua_table(\u0026trail_table)?)\n        } else {\n            None\n        };\n\n        Ok(Self {\n            name,\n            foreground,\n            background,\n            cursor,\n            selection,\n            colors,\n            background_image,\n            cursor_trail,\n        })\n    }\n}\n\nimpl Default for KeyBindings {\n    fn default() -\u003e Self {\n        Self {\n            new_tab: \"Ctrl+T\".to_string(),\n            close_tab: \"Ctrl+W\".to_string(),\n            next_tab: \"Ctrl+Tab\".to_string(),\n            prev_tab: \"Ctrl+Shift+Tab\".to_string(),\n            split_vertical: \"Ctrl+Shift+V\".to_string(),\n            split_horizontal: \"Ctrl+Shift+H\".to_string(),\n            copy: \"Ctrl+Shift+C\".to_string(),\n            paste: \"Ctrl+Shift+V\".to_string(),\n            search: \"Ctrl+F\".to_string(),\n            clear: \"Ctrl+L\".to_string(),\n        }\n    }\n}\n\nimpl KeyBindings {\n    fn from_lua_table(table: \u0026Table) -\u003e Result\u003cSelf\u003e {\n        Ok(Self {\n            new_tab: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"new_tab\")?\n                .unwrap_or_else(|| \"Ctrl+T\".to_string()),\n            close_tab: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"close_tab\")?\n                .unwrap_or_else(|| \"Ctrl+W\".to_string()),\n            next_tab: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"next_tab\")?\n                .unwrap_or_else(|| \"Ctrl+Tab\".to_string()),\n            prev_tab: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"prev_tab\")?\n                .unwrap_or_else(|| \"Ctrl+Shift+Tab\".to_string()),\n            split_vertical: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"split_vertical\")?\n                .unwrap_or_else(|| \"Ctrl+Shift+V\".to_string()),\n            split_horizontal: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"split_horizontal\")?\n                .unwrap_or_else(|| \"Ctrl+Shift+H\".to_string()),\n            copy: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"copy\")?\n                .unwrap_or_else(|| \"Ctrl+Shift+C\".to_string()),\n            paste: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"paste\")?\n                .unwrap_or_else(|| \"Ctrl+Shift+V\".to_string()),\n            search: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"search\")?\n                .unwrap_or_else(|| \"Ctrl+F\".to_string()),\n            clear: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"clear\")?\n                .unwrap_or_else(|| \"Ctrl+L\".to_string()),\n        })\n    }\n}\n\nimpl Default for AnsiColors {\n    fn default() -\u003e Self {\n        Self {\n            black: \"#000000\".to_string(),\n            red: \"#FF0000\".to_string(),\n            green: \"#00FF00\".to_string(),\n            yellow: \"#FFFF00\".to_string(),\n            blue: \"#0000FF\".to_string(),\n            magenta: \"#FF00FF\".to_string(),\n            cyan: \"#00FFFF\".to_string(),\n            white: \"#FFFFFF\".to_string(),\n            bright_black: \"#808080\".to_string(),\n            bright_red: \"#FF8080\".to_string(),\n            bright_green: \"#80FF80\".to_string(),\n            bright_yellow: \"#FFFF80\".to_string(),\n            bright_blue: \"#8080FF\".to_string(),\n            bright_magenta: \"#FF80FF\".to_string(),\n            bright_cyan: \"#80FFFF\".to_string(),\n            bright_white: \"#FFFFFF\".to_string(),\n        }\n    }\n}\n\nimpl AnsiColors {\n    fn from_lua_table(table: \u0026Table) -\u003e Result\u003cSelf\u003e {\n        Ok(Self {\n            black: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"black\")?\n                .unwrap_or_else(|| \"#000000\".to_string()),\n            red: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"red\")?\n                .unwrap_or_else(|| \"#FF0000\".to_string()),\n            green: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"green\")?\n                .unwrap_or_else(|| \"#00FF00\".to_string()),\n            yellow: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"yellow\")?\n                .unwrap_or_else(|| \"#FFFF00\".to_string()),\n            blue: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"blue\")?\n                .unwrap_or_else(|| \"#0000FF\".to_string()),\n            magenta: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"magenta\")?\n                .unwrap_or_else(|| \"#FF00FF\".to_string()),\n            cyan: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"cyan\")?\n                .unwrap_or_else(|| \"#00FFFF\".to_string()),\n            white: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"white\")?\n                .unwrap_or_else(|| \"#FFFFFF\".to_string()),\n            bright_black: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"bright_black\")?\n                .unwrap_or_else(|| \"#808080\".to_string()),\n            bright_red: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"bright_red\")?\n                .unwrap_or_else(|| \"#FF8080\".to_string()),\n            bright_green: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"bright_green\")?\n                .unwrap_or_else(|| \"#80FF80\".to_string()),\n            bright_yellow: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"bright_yellow\")?\n                .unwrap_or_else(|| \"#FFFF80\".to_string()),\n            bright_blue: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"bright_blue\")?\n                .unwrap_or_else(|| \"#8080FF\".to_string()),\n            bright_magenta: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"bright_magenta\")?\n                .unwrap_or_else(|| \"#FF80FF\".to_string()),\n            bright_cyan: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"bright_cyan\")?\n                .unwrap_or_else(|| \"#80FFFF\".to_string()),\n            bright_white: table\n                .get::\u003c_, Option\u003cString\u003e\u003e(\"bright_white\")?\n                .unwrap_or_else(|| \"#FFFFFF\".to_string()),\n        })\n    }\n}\n\nimpl Config {\n    /// Load configuration from default location\n    ///\n    /// # Errors\n    /// Returns an error if the config file exists but cannot be read or parsed\n    pub fn load_default() -\u003e Result\u003cSelf\u003e {\n        let config_path = Self::default_config_path()?;\n\n        if config_path.exists() {\n            Self::load_from_file(\u0026config_path)\n        } else {\n            Self::load_from_str(DEFAULT_CONFIG_LUA)\n        }\n    }\n\n    /// Load configuration from a Lua file\n    ///\n    /// # Errors\n    /// Returns an error if:\n    /// - The file cannot be read\n    /// - The Lua code is invalid or has syntax errors\n    /// - The Lua code does not define a 'config' table\n    /// - The config table has invalid structure or data types\n    ///\n    /// # Security\n    /// This executes Lua code from the configuration file. Only load trusted\n    /// configuration files. The Lua environment has access to the full Lua standard\n    /// library, including file I/O and OS operations.\n    pub fn load_from_file\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e Result\u003cSelf\u003e {\n        let contents = fs::read_to_string(path.as_ref()).context(\"Failed to read config file\")?;\n\n        Self::load_from_str(\u0026contents)\n    }\n\n    /// Load configuration from a Lua string\n    fn load_from_str(contents: \u0026str) -\u003e Result\u003cSelf\u003e {\n        let lua = Lua::new();\n        lua.load(contents)\n            .exec()\n            .context(\"Failed to execute Lua config\")?;\n\n        let globals = lua.globals();\n        let config_table: Table = globals\n            .get(\"config\")\n            .context(\"Config table not found in Lua file\")?;\n\n        Self::from_lua_table(\u0026config_table)\n    }\n\n    /// Parse configuration from a Lua table\n    fn from_lua_table(table: \u0026Table) -\u003e Result\u003cSelf\u003e {\n        let shell = if let Ok(shell_table) = table.get::\u003c_, Table\u003e(\"shell\") {\n            ShellConfig::from_lua_table(\u0026shell_table)?\n        } else {\n            ShellConfig::default()\n        };\n\n        let terminal = if let Ok(terminal_table) = table.get::\u003c_, Table\u003e(\"terminal\") {\n            TerminalConfig::from_lua_table(\u0026terminal_table)?\n        } else {\n            TerminalConfig::default()\n        };\n\n        let theme = if let Ok(theme_table) = table.get::\u003c_, Table\u003e(\"theme\") {\n            ThemeConfig::from_lua_table(\u0026theme_table)?\n        } else {\n            ThemeConfig::default()\n        };\n\n        let keybindings = if let Ok(kb_table) = table.get::\u003c_, Table\u003e(\"keybindings\") {\n            KeyBindings::from_lua_table(\u0026kb_table)?\n        } else {\n            KeyBindings::default()\n        };\n\n        let features = if let Ok(features_table) = table.get::\u003c_, Table\u003e(\"features\") {\n            FeaturesConfig::from_lua_table(\u0026features_table)?\n        } else {\n            FeaturesConfig::default()\n        };\n\n        let hooks = if let Ok(hooks_table) = table.get::\u003c_, Table\u003e(\"hooks\") {\n            HooksConfig::from_lua_table(\u0026hooks_table)?\n        } else {\n            HooksConfig::default()\n        };\n\n        Ok(Self {\n            shell,\n            terminal,\n            theme,\n            keybindings,\n            features,\n            hooks,\n        })\n    }\n\n    /// Get default configuration path\n    ///\n    /// # Errors\n    /// Returns an error if the home directory cannot be determined\n    pub fn default_config_path() -\u003e Result\u003cPathBuf\u003e {\n        let home = dirs::home_dir().context(\"Failed to get home directory\")?;\n\n        Ok(home.join(\".furnace\").join(\"config.lua\"))\n    }\n}\n\n/// Detect the default shell for the current platform\nfn detect_default_shell() -\u003e String {\n    #[cfg(windows)]\n    {\n        // Try PowerShell 7+ first (pwsh.exe)\n        if which::which(\"pwsh\").is_ok() {\n            return \"pwsh.exe\".to_string();\n        }\n\n        // Try PowerShell 5.1\n        if which::which(\"powershell\").is_ok() {\n            return \"powershell.exe\".to_string();\n        }\n\n        // Fallback to cmd\n        \"cmd.exe\".to_string()\n    }\n\n    #[cfg(not(windows))]\n    {\n        std::env::var(\"SHELL\").unwrap_or_else(|_| \"/bin/bash\".to_string())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_default_config_values() {\n        let config = Config::default();\n        assert!(!config.terminal.enable_tabs);\n        assert!(!config.terminal.enable_split_pane);\n        assert!(config.terminal.hardware_acceleration);\n    }\n\n    #[test]\n    fn test_lua_config_deserialization() {\n        let lua_config = r\"\nconfig = {\n    terminal = {\n        enable_tabs = true,\n        enable_split_pane = true\n    }\n}\n\";\n        let lua = Lua::new();\n        lua.load(lua_config).exec().unwrap();\n        let globals = lua.globals();\n        let config_table: Table = globals.get(\"config\").unwrap();\n        let config = Config::from_lua_table(\u0026config_table).unwrap();\n        assert!(config.terminal.enable_tabs);\n        assert!(config.terminal.enable_split_pane);\n    }\n\n    #[test]\n    fn test_complete_config_loading() {\n        let lua_config = r\"\nconfig = {\n    shell = {\n        default_shell = '/bin/bash',\n        working_dir = '/home/user',\n        env = {\n            MY_VAR = 'test_value',\n            PATH = '/custom/path'\n        }\n    },\n    terminal = {\n        max_history = 5000,\n        enable_tabs = true,\n        enable_split_pane = true,\n        hardware_acceleration = false,\n        cursor_style = 'underline',\n        font_size = 14,\n        scrollback_lines = 20000\n    },\n    theme = {\n        name = 'custom_theme',\n        foreground = 'ffffff',\n        background = '000000',\n        cursor = 'ff0000'\n    },\n    features = {\n        resource_monitor = true,\n        autocomplete = true,\n        session_manager = true,\n        theme_manager = true,\n        progress_bar = true,\n        command_palette = true\n    },\n    hooks = {\n        on_startup = 'print(1)',\n        on_shutdown = 'print(2)',\n        on_key_press = 'print(3)',\n        on_command_start = 'print(4)'\n    }\n}\n\";\n        let lua = Lua::new();\n        lua.load(lua_config).exec().unwrap();\n        let globals = lua.globals();\n        let config_table: Table = globals.get(\"config\").unwrap();\n        let config = Config::from_lua_table(\u0026config_table).unwrap();\n\n        // Verify shell config\n        assert_eq!(config.shell.default_shell, \"/bin/bash\");\n        assert_eq!(config.shell.working_dir, Some(\"/home/user\".to_string()));\n        assert_eq!(config.shell.env.len(), 2);\n        assert_eq!(\n            config.shell.env.get(\"MY_VAR\"),\n            Some(\u0026\"test_value\".to_string())\n        );\n\n        // Verify terminal config\n        assert_eq!(config.terminal.max_history, 5000);\n        assert!(config.terminal.enable_tabs);\n        assert!(config.terminal.enable_split_pane);\n        assert!(!config.terminal.hardware_acceleration);\n        assert_eq!(config.terminal.cursor_style, \"underline\");\n        assert_eq!(config.terminal.font_size, 14);\n        assert_eq!(config.terminal.scrollback_lines, 20000);\n\n        // Verify theme config\n        assert_eq!(config.theme.name, \"custom_theme\");\n\n        // Verify features config\n        assert!(config.features.resource_monitor);\n        assert!(config.features.autocomplete);\n        assert!(config.features.session_manager);\n        assert!(config.features.theme_manager);\n        assert!(config.features.progress_bar);\n        assert!(config.features.command_palette);\n\n        // Verify hooks config are loaded\n        assert!(config.hooks.on_startup.is_some());\n        assert!(config.hooks.on_shutdown.is_some());\n        assert!(config.hooks.on_key_press.is_some());\n        assert!(config.hooks.on_command_start.is_some());\n    }\n\n    #[test]\n    fn test_config_file_loading() {\n        // Test that config.lua exists\n        let config_path = std::path::Path::new(\"config.lua\");\n        assert!(\n            config_path.exists(),\n            \"config.lua should exist in repository root\"\n        );\n\n        // Note: The actual file has platform detection code using os.execute\n        // which won't work in a sandboxed test environment.\n        // The important thing is the file exists and the structure is valid for real usage.\n    }\n}\n","traces":[{"line":43,"address":[5751152,5756753],"length":1,"stats":{"Line":2}},{"line":44,"address":[7461431,7462938,7461578],"length":1,"stats":{"Line":4}},{"line":45,"address":[7461864,7461684,7461612],"length":1,"stats":{"Line":4}},{"line":46,"address":[6400411,6400157,6400230],"length":1,"stats":{"Line":4}},{"line":47,"address":[7462436,7462256,7462184],"length":1,"stats":{"Line":4}},{"line":48,"address":[6400987,6400733,6400806],"length":1,"stats":{"Line":4}},{"line":49,"address":[5752572,5752500,5752854],"length":1,"stats":{"Line":4}},{"line":50,"address":[6401553,6401661,6401412],"length":1,"stats":{"Line":4}},{"line":51,"address":[5753058,5753307,5753805],"length":1,"stats":{"Line":4}},{"line":53,"address":[6469676],"length":1,"stats":{"Line":2}},{"line":54,"address":[5753410],"length":1,"stats":{"Line":0}},{"line":55,"address":[6469861],"length":1,"stats":{"Line":0}},{"line":56,"address":[5754377,5753678],"length":1,"stats":{"Line":0}},{"line":59,"address":[5753935],"length":1,"stats":{"Line":0 "address":[6431038],"length":1,"stats":{"Line":4}},{"line":675,"address":[5782111,5782167,5782080,5782135],"length":1,"stats":{"Line":16}},{"line":676,"address":[6431122],"length":1,"stats":{"Line":4}},{"line":677,"address":[7492298],"length":1,"stats":{"Line":4}},{"line":678,"address":[6499075],"length":1,"stats":{"Line":4}},{"line":679,"address":[6431291],"length":1,"stats":{"Line":4}},{"line":681,"address":[6499123],"length":1,"stats":{"Line":4}},{"line":689,"address":[6431952,6432453],"length":1,"stats":{"Line":0}},{"line":690,"address":[6499889,6499789,6499824],"length":1,"stats":{"Line":0}},{"line":692,"address":[6499982],"length":1,"stats":{"Line":0}},{"line":697,"address":[6495072],"length":1,"stats":{"Line":0}},{"line":716,"address":[6054345,6054195,6054016],"length":1,"stats":{"Line":0}}],"covered":123,"coverable":260},{"path":["/","workspaces","furnace","src","gpu","glyph_cache.rs"],"content":"//! Glyph cache for GPU text rendering\n//!\n//! Caches rasterized glyphs in a texture atlas for efficient GPU rendering.\n//! Uses fontdue for font rasterization to provide actual glyph bitmaps.\n\nuse std::collections::HashMap;\n\n/// Glyph cache for efficient text rendering with fontdue font rasterization\n///\n/// Manages a texture atlas of pre-rendered glyphs for efficient GPU rendering.\n#[allow(dead_code)] // Public API - used by GPU renderer consumers\npub struct GlyphCache {\n    /// Map from character code to UV coordinates in atlas\n    glyph_map: HashMap\u003cu32, GlyphInfo\u003e,\n    /// Font for rasterization\n    #[cfg(feature = \"gpu\")]\n    font: Option\u003cfontdue::Font\u003e,\n    /// Font size\n    font_size: f32,\n    /// Font family name (used for font loading)\n    font_family: String,\n    /// Atlas dimensions\n    atlas_size: u32,\n    /// Current x position in atlas\n    cursor_x: u32,\n    /// Current y position in atlas  \n    cursor_y: u32,\n    /// Maximum height in current row\n    row_height: u32,\n    /// Atlas bitmap data (R8 format)\n    atlas_data: Vec\u003cu8\u003e,\n}\n\n/// Information about a cached glyph\n///\n/// Contains UV coordinates and metrics for rendering a single glyph.\n#[derive(Debug, Clone, Copy)]\n#[allow(dead_code)] // Public API - used by GPU renderer consumers\npub struct GlyphInfo {\n    /// UV coordinates (x, y, width, height) normalized to 0-1\n    pub uv: [f32; 4],\n    /// Advance width in pixels\n    pub advance: f32,\n    /// Bearing (offset from baseline)\n    pub bearing: [f32; 2],\n    /// Glyph dimensions in pixels\n    pub size: [f32; 2],\n}\n\n#[allow(dead_code)] // Public API - methods used by GPU text rendering consumers\nimpl GlyphCache {\n    /// Create a new glyph cache with font loading\n    ///\n    /// BUG FIX #4: Implement actual font loading and rasterization\n    pub fn new(font_size: f32, font_family: \u0026str) -\u003e Self {\n        #[cfg(feature = \"gpu\")]\n        let font = Self::load_font(font_family);\n\n        let atlas_size = 2048;\n        let mut cache = Self {\n            glyph_map: HashMap::with_capacity(256),\n            #[cfg(feature = \"gpu\")]\n            font,\n            font_size,\n            font_family: font_family.to_string(),\n            atlas_size,\n            cursor_x: 0,\n            cursor_y: 0,\n            row_height: 0,\n            atlas_data: vec![0u8; (atlas_size * atlas_size) as usize],\n        };\n\n        // Pre-cache ASCII characters\n        cache.precache_ascii();\n\n        cache\n    }\n\n    /// Load font from system or embedded\n    ///\n    /// BUG FIX #4: Actually load fonts for rendering\n    #[cfg(feature = \"gpu\")]\n    fn load_font(font_family: \u0026str) -\u003e Option\u003cfontdue::Font\u003e {\n        // Try to load from common system font paths\n        let font_paths = Self::get_font_paths(font_family);\n\n        for path in font_paths {\n            if let Ok(data) = std::fs::read(\u0026path) {\n                if let Ok(font) = fontdue::Font::from_bytes(data, fontdue::FontSettings::default())\n                {\n                    tracing::info!(\"Loaded font from: {}\", path);\n                    return Some(font);\n                }\n            }\n        }\n\n        // Fallback to embedded font data (a minimal monospace font)\n        // In production, include a default monospace font like JetBrains Mono\n        tracing::warn!(\"Could not load font '{}', using fallback\", font_family);\n        None\n    }\n\n    /// Get common font file paths based on font name\n    #[cfg(feature = \"gpu\")]\n    fn get_font_paths(font_family: \u0026str) -\u003e Vec\u003cString\u003e {\n        let mut paths = Vec::new();\n\n        // Windows\n        paths.push(format!(\"C:\\\\Windows\\\\Fonts\\\\{}.ttf\", font_family));\n        paths.push(format!(\"C:\\\\Windows\\\\Fonts\\\\{}.otf\", font_family));\n\n        // Common monospace fonts on Windows\n        if font_family.contains(\"Mono\") || font_family.contains(\"Consolas\") {\n            paths.push(\"C:\\\\Windows\\\\Fonts\\\\consola.ttf\".to_string());\n            paths.push(\"C:\\\\Windows\\\\Fonts\\\\cour.ttf\".to_string());\n        }\n\n        // Linux\n        paths.push(format!(\n            \"/usr/share/fonts/truetype/{}/{}.ttf\",\n            font_family.to_lowercase(),\n            font_family\n        ));\n        paths.push(format!(\"/usr/share/fonts/TTF/{}.ttf\", font_family));\n\n        // macOS\n        paths.push(format!(\"/System/Library/Fonts/{}.ttf\", font_family));\n        paths.push(format!(\"/Library/Fonts/{}.ttf\", font_family));\n\n        paths\n    }\n\n    /// Pre-cache ASCII characters for faster rendering\n    ///\n    /// BUG FIX #4: Actually rasterize glyphs and upload to atlas\n    fn precache_ascii(\u0026mut self) {\n        #[cfg(feature = \"gpu\")]\n        {\n            if self.font.is_some() {\n                // Cache printable ASCII (32-126)\n                for code in 32u32..=126 {\n                    if let Some(c) = char::from_u32(code) {\n                        // Borrow font separately to avoid borrow conflict\n                        self.cache_glyph_rendered(c, code);\n                    }\n                }\n                return;\n            }\n        }\n\n        // Fallback: use placeholder rects if no font available\n        self.precache_ascii_placeholders();\n    }\n\n    /// Cache a single glyph by rendering it\n    ///\n    /// BUG FIX #4: Helper method to avoid borrow conflicts\n    #[cfg(feature = \"gpu\")]\n    fn cache_glyph_rendered(\u0026mut self, c: char, code: u32) {\n        // Get font reference\n        let Some(ref font) = self.font else {\n            return;\n        };\n\n        // Rasterize the glyph\n        let (metrics, bitmap) = font.rasterize(c, self.font_size);\n\n        let width = metrics.width as u32;\n        let height = metrics.height as u32;\n\n        // Skip if glyph is too large or empty\n        if width == 0 || height == 0 || width \u003e 256 || height \u003e 256 {\n            return;\n        }\n\n        // Find space in atlas\n        if self.cursor_x + width \u003e self.atlas_size {\n            self.cursor_x = 0;\n            self.cursor_y += self.row_height + 2;\n            self.row_height = 0;\n        }\n\n        // Check if we have vertical space\n        if self.cursor_y + height \u003e self.atlas_size {\n            tracing::warn!(\"Atlas full, cannot cache more glyphs\");\n            return;\n        }\n\n        // Copy bitmap data to atlas\n        for y in 0..height {\n            for x in 0..width {\n                let src_idx = (y * width + x) as usize;\n                let dst_x = self.cursor_x + x;\n                let dst_y = self.cursor_y + y;\n                let dst_idx = (dst_y * self.atlas_size + dst_x) as usize;\n\n                if src_idx \u003c bitmap.len() \u0026\u0026 dst_idx \u003c self.atlas_data.len() {\n                    self.atlas_data[dst_idx] = bitmap[src_idx];\n                }\n            }\n        }\n\n        // Calculate UV coordinates (normalized 0-1)\n        let atlas_size = self.atlas_size as f32;\n        let uv = [\n            self.cursor_x as f32 / atlas_size,\n            self.cursor_y as f32 / atlas_size,\n            width as f32 / atlas_size,\n            height as f32 / atlas_size,\n        ];\n\n        // Store glyph info\n        self.glyph_map.insert(\n            code,\n            GlyphInfo {\n                uv,\n                advance: metrics.advance_width,\n                bearing: [metrics.xmin as f32, metrics.ymin as f32],\n                size: [width as f32, height as f32],\n            },\n        );\n\n        self.cursor_x += width + 2; // 2-pixel padding\n        self.row_height = self.row_height.max(height);\n    }\n\n    /// Fallback: pre-cache ASCII with placeholder rectangles\n    fn precache_ascii_placeholders(\u0026mut self) {\n        // BUG FIX #8: Use consistent font metric ratios\n        const CELL_WIDTH_RATIO: f32 = 0.6;\n        const CELL_HEIGHT_RATIO: f32 = 1.2;\n        let glyph_width = (self.font_size * CELL_WIDTH_RATIO) as u32;\n        let glyph_height = (self.font_size * CELL_HEIGHT_RATIO) as u32;\n        let atlas_size = self.atlas_size as f32;\n\n        // Cache printable ASCII (32-126)\n        for code in 32u32..=126 {\n            // Calculate position in atlas\n            if self.cursor_x + glyph_width \u003e self.atlas_size {\n                self.cursor_x = 0;\n                self.cursor_y += self.row_height + 2;\n                self.row_height = 0;\n            }\n\n            let uv = [\n                self.cursor_x as f32 / atlas_size,\n                self.cursor_y as f32 / atlas_size,\n                glyph_width as f32 / atlas_size,\n                glyph_height as f32 / atlas_size,\n            ];\n\n            self.glyph_map.insert(\n                code,\n                GlyphInfo {\n                    uv,\n                    advance: glyph_width as f32,\n                    bearing: [0.0, glyph_height as f32 * 0.8],\n                    size: [glyph_width as f32, glyph_height as f32],\n                },\n            );\n\n            self.cursor_x += glyph_width + 2;\n            self.row_height = self.row_height.max(glyph_height);\n        }\n    }\n\n    /// Get UV coordinates for a glyph\n    pub fn get_glyph_uv(\u0026self, char_code: u32) -\u003e Option\u003c[f32; 4]\u003e {\n        self.glyph_map.get(\u0026char_code).map(|info| info.uv)\n    }\n\n    /// Get glyph info\n    pub fn get_glyph(\u0026self, char_code: u32) -\u003e Option\u003c\u0026GlyphInfo\u003e {\n        self.glyph_map.get(\u0026char_code)\n    }\n\n    /// Cache a new glyph (returns UV coordinates)\n    ///\n    /// BUG FIX #4: Support dynamic glyph caching at runtime\n    pub fn cache_glyph(\n        \u0026mut self,\n        char_code: u32,\n        bitmap: \u0026[u8],\n        width: u32,\n        height: u32,\n    ) -\u003e [f32; 4] {\n        // Check if already cached\n        if let Some(info) = self.glyph_map.get(\u0026char_code) {\n            return info.uv;\n        }\n\n        let atlas_size = self.atlas_size as f32;\n\n        // Find space in atlas\n        if self.cursor_x + width \u003e self.atlas_size {\n            self.cursor_x = 0;\n            self.cursor_y += self.row_height + 2;\n            self.row_height = 0;\n        }\n\n        // Copy bitmap to atlas if provided\n        if !bitmap.is_empty() {\n            for y in 0..height {\n                for x in 0..width {\n                    let src_idx = (y * width + x) as usize;\n                    let dst_x = self.cursor_x + x;\n                    let dst_y = self.cursor_y + y;\n                    let dst_idx = (dst_y * self.atlas_size + dst_x) as usize;\n\n                    if src_idx \u003c bitmap.len() \u0026\u0026 dst_idx \u003c self.atlas_data.len() {\n                        self.atlas_data[dst_idx] = bitmap[src_idx];\n                    }\n                }\n            }\n        }\n\n        let uv = [\n            self.cursor_x as f32 / atlas_size,\n            self.cursor_y as f32 / atlas_size,\n            width as f32 / atlas_size,\n            height as f32 / atlas_size,\n        ];\n\n        self.glyph_map.insert(\n            char_code,\n            GlyphInfo {\n                uv,\n                advance: width as f32,\n                bearing: [0.0, height as f32 * 0.8],\n                size: [width as f32, height as f32],\n            },\n        );\n\n        self.cursor_x += width + 2;\n        self.row_height = self.row_height.max(height);\n\n        uv\n    }\n\n    /// Get atlas data for uploading to GPU\n    ///\n    /// BUG FIX #4: Provide access to atlas bitmap for GPU upload\n    pub fn atlas_data(\u0026self) -\u003e \u0026[u8] {\n        \u0026self.atlas_data\n    }\n\n    /// Get atlas dimensions\n    pub fn atlas_size(\u0026self) -\u003e u32 {\n        self.atlas_size\n    }\n\n    /// Get number of cached glyphs\n    pub fn len(\u0026self) -\u003e usize {\n        self.glyph_map.len()\n    }\n\n    /// Check if cache is empty\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.glyph_map.is_empty()\n    }\n\n    /// Clear the cache\n    pub fn clear(\u0026mut self) {\n        self.glyph_map.clear();\n        self.cursor_x = 0;\n        self.cursor_y = 0;\n        self.row_height = 0;\n        self.atlas_data.fill(0);\n    }\n\n    /// Get the font family name\n    ///\n    /// Returns the name of the font family currently in use.\n    ///\n    /// # Production Use Cases\n    /// - Displaying current font in settings UI\n    /// - Logging font information for debugging\n    /// - Saving font preference to configuration\n    /// - Implementing font selection dialog\n    pub fn font_family(\u0026self) -\u003e \u0026str {\n        \u0026self.font_family\n    }\n\n    /// Reload the font with a new family\n    ///\n    /// Changes the font family and reloads glyphs with the new font.\n    /// The atlas is cleared and all glyphs are re-cached with the new font.\n    ///\n    /// **Note**: This method is only available with the `gpu` feature enabled.\n    ///\n    /// # Production Use Cases\n    /// - Implementing font change in settings\n    /// - Font hot-reloading during development\n    /// - A/B testing different fonts for readability\n    /// - User preference customization\n    ///\n    /// # Arguments\n    /// * `font_family` - Name of the new font family to load\n    ///\n    /// # Returns\n    /// Returns `true` if the font was successfully loaded, `false` if fallback was used\n    #[cfg(feature = \"gpu\")]\n    pub fn reload_font(\u0026mut self, font_family: \u0026str) -\u003e bool {\n        self.font_family = font_family.to_string();\n        self.font = Self::load_font(font_family);\n\n        // Clear and rebuild cache with new font\n        self.clear();\n\n        // Re-cache ASCII characters with new font\n        let has_font = self.font.is_some();\n        self.precache_ascii();\n        has_font\n    }\n\n    /// Get font metrics information\n    ///\n    /// Returns detailed metrics about the current font for layout calculations\n    /// and debugging.\n    ///\n    /// # Production Use Cases\n    /// - Calculating precise cell dimensions\n    /// - Implementing pixel-perfect layout\n    /// - Debugging font rendering issues\n    /// - Optimizing atlas size based on font characteristics\n    ///\n    /// # Returns\n    /// A tuple of (font_size, font_family, has_real_font, cached_glyph_count)\n    pub fn font_metrics(\u0026self) -\u003e (f32, \u0026str, bool, usize) {\n        #[cfg(feature = \"gpu\")]\n        let has_font = self.font.is_some();\n        #[cfg(not(feature = \"gpu\"))]\n        let has_font = false;\n\n        (\n            self.font_size,\n            \u0026self.font_family,\n            has_font,\n            self.glyph_map.len(),\n        )\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_glyph_cache_creation() {\n        let cache = GlyphCache::new(14.0, \"JetBrains Mono\");\n        // ASCII characters should be pre-cached\n        assert!(cache.len() \u003e= 95); // 126 - 32 + 1\n    }\n\n    #[test]\n    fn test_get_ascii_glyph() {\n        let cache = GlyphCache::new(14.0, \"Monospace\");\n\n        // Test getting ASCII characters\n        assert!(cache.get_glyph('A' as u32).is_some());\n        assert!(cache.get_glyph('z' as u32).is_some());\n        assert!(cache.get_glyph(' ' as u32).is_some());\n    }\n\n    #[test]\n    fn test_cache_new_glyph() {\n        let mut cache = GlyphCache::new(14.0, \"Monospace\");\n\n        // Cache a non-ASCII glyph\n        let uv = cache.cache_glyph(0x1F600, \u0026[], 20, 20); // Emoji\n\n        // Should be retrievable\n        assert_eq!(cache.get_glyph_uv(0x1F600), Some(uv));\n    }\n\n    #[test]\n    fn test_atlas_data_access() {\n        let cache = GlyphCache::new(14.0, \"Monospace\");\n        let data = cache.atlas_data();\n        assert_eq!(data.len(), (2048 * 2048) as usize);\n    }\n\n    #[test]\n    fn test_font_family_getter() {\n        let cache = GlyphCache::new(14.0, \"JetBrains Mono\");\n        assert_eq!(cache.font_family(), \"JetBrains Mono\");\n    }\n\n    #[test]\n    fn test_font_metrics() {\n        let cache = GlyphCache::new(14.0, \"Monospace\");\n        let (size, family, _has_font, count) = cache.font_metrics();\n\n        assert_eq!(size, 14.0);\n        assert_eq!(family, \"Monospace\");\n        assert!(count \u003e= 95); // At least ASCII characters\n                              // _has_font depends on whether the font was successfully loaded\n    }\n\n    #[test]\n    #[cfg(feature = \"gpu\")]\n    fn test_reload_font() {\n        let mut cache = GlyphCache::new(14.0, \"Monospace\");\n\n        // Reload with different font\n        cache.reload_font(\"Courier\");\n        assert_eq!(cache.font_family(), \"Courier\");\n\n        // Cache should still have ASCII characters\n        assert!(cache.len() \u003e= 95);\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","furnace","src","gpu","mod.rs"],"content":"//! GPU-accelerated rendering module for Furnace terminal\n//!\n//! This module provides true hardware-accelerated rendering using wgpu,\n//! enabling 170+ FPS rendering with minimal CPU usage.\n//!\n//! # Features\n//! - Hardware-accelerated text rendering via glyphon\n//! - True 24-bit color support with HDR capability\n//! - Sub-pixel font rendering for crisp text\n//! - Efficient glyph caching to minimize GPU uploads\n//! - Background blur and transparency effects\n//! - Smooth cursor animation\n\n#[cfg(feature = \"gpu\")]\npub mod renderer;\n\n#[cfg(feature = \"gpu\")]\npub mod text;\n\n#[cfg(feature = \"gpu\")]\npub mod glyph_cache;\n\n#[cfg(feature = \"gpu\")]\n#[allow(unused_imports)] // Re-export may not be used internally but is part of public API\npub use renderer::GpuRenderer;\n\n/// GPU rendering configuration\n///\n/// Configuration options for GPU-accelerated terminal rendering.\n/// These fields are read by the GPU renderer when initializing.\n#[derive(Debug, Clone)]\n#[allow(clippy::struct_excessive_bools)]\n#[allow(dead_code)] // Public API - fields used by GPU renderer consumers\npub struct GpuConfig {\n    /// Enable GPU acceleration (falls back to CPU if unavailable)\n    pub enabled: bool,\n    /// Preferred GPU backend (Vulkan, Metal, DX12, etc.)\n    pub backend: GpuBackend,\n    /// Enable `VSync` (limits to monitor refresh rate)\n    pub vsync: bool,\n    /// Font size in points\n    pub font_size: f32,\n    /// Font family name\n    pub font_family: String,\n    /// Enable sub-pixel rendering for sharper text\n    pub subpixel_rendering: bool,\n    /// Background opacity (0.0 = transparent, 1.0 = opaque)\n    pub background_opacity: f32,\n    /// Enable background blur effect\n    pub background_blur: bool,\n    /// Cell padding in pixels\n    pub cell_padding: u32,\n    /// Initial window width (None = use defaults)\n    /// BUG FIX #3: Make screen dimensions configurable instead of hardcoding\n    pub initial_width: Option\u003cf32\u003e,\n    /// Initial window height (None = use defaults)\n    pub initial_height: Option\u003cf32\u003e,\n}\n\nimpl Default for GpuConfig {\n    fn default() -\u003e Self {\n        Self {\n            enabled: true,\n            backend: GpuBackend::Auto,\n            vsync: true,\n            font_size: 14.0,\n            font_family: String::from(\"JetBrains Mono\"),\n            subpixel_rendering: true,\n            background_opacity: 1.0,\n            background_blur: false,\n            cell_padding: 2,\n            initial_width: None,  // Will use 1280.0 by default in renderer\n            initial_height: None, // Will use 720.0 by default in renderer\n        }\n    }\n}\n\n/// GPU backend selection\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Default)]\npub enum GpuBackend {\n    /// Automatically select best available backend\n    #[default]\n    Auto,\n    /// Vulkan (Linux, Windows, Android)\n    Vulkan,\n    /// Metal (macOS, iOS)\n    Metal,\n    /// DirectX 12 (Windows)\n    Dx12,\n    /// DirectX 11 (Windows, fallback)\n    Dx11,\n    /// OpenGL (fallback, all platforms)\n    OpenGl,\n    /// WebGPU (browser)\n    WebGpu,\n}\n\n#[cfg(feature = \"gpu\")]\nimpl From\u003cGpuBackend\u003e for wgpu::Backends {\n    fn from(backend: GpuBackend) -\u003e Self {\n        match backend {\n            GpuBackend::Auto =\u003e wgpu::Backends::all(),\n            GpuBackend::Vulkan =\u003e wgpu::Backends::VULKAN,\n            GpuBackend::Metal =\u003e wgpu::Backends::METAL,\n            GpuBackend::Dx12 =\u003e wgpu::Backends::DX12,\n            // NOTE: DX11 is not available in wgpu 0.19, falling back to DX12\n            // This maintains compatibility with the API while using the best available backend\n            GpuBackend::Dx11 =\u003e {\n                tracing::warn!(\"DX11 backend not available in wgpu 0.19, using DX12 instead\");\n                wgpu::Backends::DX12\n            }\n            GpuBackend::OpenGl =\u003e wgpu::Backends::GL,\n            GpuBackend::WebGpu =\u003e wgpu::Backends::BROWSER_WEBGPU,\n        }\n    }\n}\n\n/// Terminal cell for GPU rendering\n///\n/// Represents a single cell in the terminal grid for GPU rendering.\n#[derive(Debug, Clone, Copy)]\n#[allow(dead_code)] // Public API - used by GPU renderer consumers\npub struct GpuCell {\n    /// Character to render (as u32 for Unicode support)\n    pub char_code: u32,\n    /// Foreground color (RGBA)\n    pub fg_color: [f32; 4],\n    /// Background color (RGBA)\n    pub bg_color: [f32; 4],\n    /// Style flags (bold, italic, underline, etc.)\n    pub style: CellStyle,\n}\n\nimpl Default for GpuCell {\n    fn default() -\u003e Self {\n        Self {\n            char_code: ' ' as u32,\n            fg_color: [1.0, 1.0, 1.0, 1.0], // White\n            bg_color: [0.0, 0.0, 0.0, 1.0], // Black\n            style: CellStyle::empty(),\n        }\n    }\n}\n\nbitflags::bitflags! {\n    /// Cell style flags for GPU rendering\n    #[derive(Debug, Clone, Copy, PartialEq, Eq)]\n    pub struct CellStyle: u8 {\n        const BOLD = 0b0000_0001;\n        const ITALIC = 0b0000_0010;\n        const UNDERLINE = 0b0000_0100;\n        const STRIKETHROUGH = 0b0000_1000;\n        const BLINK = 0b0001_0000;\n        const REVERSE = 0b0010_0000;\n        const DIM = 0b0100_0000;\n        const HIDDEN = 0b1000_0000;\n    }\n}\n\n/// GPU rendering statistics\n///\n/// Statistics about GPU rendering performance for monitoring and debugging.\n#[derive(Debug, Clone, Default)]\n#[allow(dead_code)] // Public API - fields used for performance monitoring\npub struct GpuStats {\n    /// Frames rendered\n    pub frame_count: u64,\n    /// Average frame time in milliseconds\n    pub avg_frame_time_ms: f64,\n    /// GPU memory used in bytes\n    pub gpu_memory_bytes: u64,\n    /// Number of cached glyphs\n    pub cached_glyphs: usize,\n    /// Draw calls per frame\n    pub draw_calls: u32,\n}\n\n/// Check if GPU rendering is available\n#[cfg(feature = \"gpu\")]\n#[must_use]\npub fn is_gpu_available() -\u003e bool {\n    // Try to create an instance to check availability\n    let instance = wgpu::Instance::new(wgpu::InstanceDescriptor {\n        backends: wgpu::Backends::all(),\n        ..Default::default()\n    });\n\n    // Check if any adapters are available\n    pollster::block_on(async {\n        instance\n            .request_adapter(\u0026wgpu::RequestAdapterOptions {\n                power_preference: wgpu::PowerPreference::HighPerformance,\n                compatible_surface: None,\n                force_fallback_adapter: false,\n            })\n            .await\n            .is_some()\n    })\n}\n\n#[cfg(not(feature = \"gpu\"))]\n#[must_use]\npub fn is_gpu_available() -\u003e bool {\n    false\n}\n\n/// Get GPU device information\n///\n/// Returns information about the available GPU device for debugging.\n#[cfg(feature = \"gpu\")]\n#[must_use]\n#[allow(dead_code)] // Public API - used for debugging and diagnostics\npub fn get_gpu_info() -\u003e Option\u003cString\u003e {\n    let instance = wgpu::Instance::new(wgpu::InstanceDescriptor {\n        backends: wgpu::Backends::all(),\n        ..Default::default()\n    });\n\n    pollster::block_on(async {\n        instance\n            .request_adapter(\u0026wgpu::RequestAdapterOptions {\n                power_preference: wgpu::PowerPreference::HighPerformance,\n                compatible_surface: None,\n                force_fallback_adapter: false,\n            })\n            .await\n            .map(|adapter| {\n                let info = adapter.get_info();\n                format!(\n                    \"{} ({:?}) - {:?}\",\n                    info.name, info.backend, info.device_type\n                )\n            })\n    })\n}\n\n#[cfg(not(feature = \"gpu\"))]\n#[must_use]\npub fn get_gpu_info() -\u003e Option\u003cString\u003e {\n    None\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","furnace","src","gpu","renderer.rs"],"content":"//! GPU renderer implementation using wgpu\n//!\n//! Provides hardware-accelerated rendering for the terminal.\n//!\n//! # Implementation Status\n//!\n//! This GPU renderer is an **optional feature** currently under active development.\n//! Some functionality is not yet complete:\n//!\n//! ## ⚠️ Known Limitations\n//!\n//! 1. **Surface Creation (BUG #10)**: The renderer does not create its own surface.\n//!    To use GPU rendering, you must:\n//!    - Create a window using `winit` or similar\n//!    - Create a wgpu surface from that window\n//!    - Pass the surface to the renderer via the `set_surface()` method\n//!\n//! ## ✅ Implemented Features\n//!\n//! - Glyph atlas creation and upload to GPU texture\n//! - Font rasterization using fontdue\n//! - Cell-based rendering with instancing\n//! - 24-bit true color support\n//! - Text style support (bold, italic, underline)\n//! - Dirty cell tracking for optimized updates (BUG #24 fixed)\n//! - Change detection to minimize GPU uploads\n//!\n//! ## Usage\n//!\n//! To enable GPU rendering:\n//! ```bash\n//! cargo build --features gpu\n//! ```\n//!\n//! See `examples/gpu_rendering.rs` (TODO) for complete usage example.\n\n// Allow pedantic warnings for optional GPU feature code\n#![allow(clippy::pedantic)]\n\nuse wgpu::util::DeviceExt;\n\nuse super::{GpuCell, GpuConfig, GpuStats};\n\n/// GPU-accelerated terminal renderer\n///\n/// Provides hardware-accelerated text rendering using wgpu for 170+ FPS performance.\n/// This renderer uses the GPU to draw terminal cells with custom colors and styles.\n///\n/// # Architecture\n/// - Uses vertex and instance buffers for efficient cell rendering\n/// - Maintains a glyph atlas texture for character caching\n/// - Supports 24-bit true color rendering\n/// - Implements dirty flagging for optimal performance\n///\n/// # Note\n/// and used in the complete GPU rendering pipeline. The GPU module is an optional feature\n/// that is still under development.\n#[allow(dead_code)] // Public API - struct and fields used by GPU renderer consumers\npub struct GpuRenderer {\n    /// WGPU instance\n    instance: wgpu::Instance,\n    /// GPU adapter\n    adapter: wgpu::Adapter,\n    /// GPU device\n    device: wgpu::Device,\n    /// Command queue\n    queue: wgpu::Queue,\n    /// Surface for rendering (if windowed)\n    surface: Option\u003cwgpu::Surface\u003c'static\u003e\u003e,\n    /// Surface configuration\n    surface_config: Option\u003cwgpu::SurfaceConfiguration\u003e,\n    /// Render pipeline for text\n    text_pipeline: wgpu::RenderPipeline,\n    /// Render pipeline for backgrounds\n    bg_pipeline: wgpu::RenderPipeline,\n    /// Vertex buffer for quads\n    vertex_buffer: wgpu::Buffer,\n    /// Index buffer for quads\n    index_buffer: wgpu::Buffer,\n    /// Instance buffer for cells\n    instance_buffer: wgpu::Buffer,\n    /// Uniform buffer for view/projection\n    uniform_buffer: wgpu::Buffer,\n    /// Bind group for uniforms\n    uniform_bind_group: wgpu::BindGroup,\n    /// Glyph texture atlas\n    glyph_atlas: wgpu::Texture,\n    /// Glyph atlas view\n    glyph_atlas_view: wgpu::TextureView,\n    /// Glyph atlas sampler\n    glyph_sampler: wgpu::Sampler,\n    /// Glyph bind group\n    glyph_bind_group: wgpu::BindGroup,\n    /// Terminal dimensions (columns, rows)\n    terminal_size: (u32, u32),\n    /// Cell size in pixels (width, height)\n    cell_size: (f32, f32),\n    /// Current cells to render\n    cells: Vec\u003cGpuCell\u003e,\n    /// Dirty cell tracking for optimization (BUG #24)\n    dirty_cells: Vec\u003cbool\u003e,\n    /// Previous frame cells for change detection\n    prev_cells: Vec\u003cGpuCell\u003e,\n    /// Configuration\n    config: GpuConfig,\n    /// Statistics\n    stats: GpuStats,\n    /// Glyph cache\n    glyph_cache: super::glyph_cache::GlyphCache,\n}\n\n///
