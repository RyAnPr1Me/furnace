_interval: Duration::from_millis(500), // Update every 500ms\n            cached_stats: None,\n        }\n    }\n\n    /// Get current resource statistics (with caching)\n    pub fn get_stats(\u0026mut self) -\u003e ResourceStats {\n        // Return cached stats if update interval hasn't elapsed\n        if self.last_update.elapsed() \u003c self.update_interval {\n            if let Some(ref stats) = self.cached_stats {\n                return stats.clone();\n            }\n        }\n\n        // Need to update - only refresh what's necessary\n        if let Ok(mut system) = self.system.lock() {\n            system.refresh_cpu();\n            system.refresh_memory();\n            // Skip processes refresh if not needed for display\n            system.refresh_processes();\n        }\n        self.last_update = Instant::now();\n\n        // Safely lock the system, return cached or default stats if lock fails\n        let Ok(system) = self.system.lock() else {\n            // Return cached stats if available, otherwise return default empty stats\n            return self.cached_stats.clone().unwrap_or(ResourceStats {\n                cpu_usage: 0.0,\n                cpu_count: 1,\n                memory_used: 0,\n                memory_total: 1,\n                memory_percent: 0.0,\n                process_count: 0,\n                network_rx: 0,\n                network_tx: 0,\n                disk_usage: Vec::new(),\n            });\n        };\n\n        // CPU usage (average across all cores) - optimized calculation\n        let cpus = system.cpus();\n        let cpu_count = cpus.len().max(1);\n        #[allow(clippy::cast_precision_loss)]\n        let cpu_usage = cpus.iter().map(sysinfo::Cpu::cpu_usage).sum::\u003cf32\u003e() / cpu_count as f32;\n\n        // Memory usage\n        let memory_used = system.used_memory();\n        let memory_total = system.total_memory();\n        #[allow(clippy::cast_precision_loss)]\n        let memory_percent = if memory_total \u003e 0 {\n            (memory_used as f32 / memory_total as f32) * 100.0\n        } else {\n            0.0\n        };\n\n        // Process count (lightweight)\n        let process_count = system.processes().len();\n\n        // Network and disk stats - Basic implementation\n        // Note: Advanced network/disk monitoring requires platform-specific APIs\n        // Current implementation provides basic disk info available cross-platform\n        let (network_rx, network_tx) = Self::get_network_stats();\n        let disk_usage = Self::get_disk_info(\u0026system);\n\n        let stats = ResourceStats {\n            cpu_usage,\n            cpu_count,\n            memory_used,\n            memory_total,\n            memory_percent,\n            process_count,\n            network_rx,\n            network_tx,\n            disk_usage,\n        };\n\n        // Cache the stats\n        self.cached_stats = Some(stats.clone());\n        stats\n    }\n\n    /// Get basic network statistics (cross-platform implementation)\n    /// Returns `(rx_bytes, tx_bytes)`\n    fn get_network_stats() -\u003e (u64, u64) {\n        use sysinfo::Networks;\n\n        // Get network information\n        let networks = Networks::new_with_refreshed_list();\n\n        let mut total_rx = 0u64;\n        let mut total_tx = 0u64;\n\n        for (_interface_name, network) in networks.iter() {\n            total_rx = total_rx.saturating_add(network.total_received());\n            total_tx = total_tx.saturating_add(network.total_transmitted());\n        }\n\n        (total_rx, total_tx)\n    }\n\n    /// Get disk usage information\n    fn get_disk_info(_system: \u0026System) -\u003e Vec\u003cDiskInfo\u003e {\n        // Get disk information using sysinfo's Disks API\n        let disks = Disks::new_with_refreshed_list();\n\n        disks\n            .iter()\n            .map(|disk| {\n                let total = disk.total_space();\n                let available = disk.available_space();\n                let used = total.saturating_sub(available);\n                #[allow(clippy::cast_precision_loss)]\n                let percent = if total \u003e 0 {\n                    (used as f32 / total as f32) * 100.0\n                } else {\n                    0.0\n                };\n\n                DiskInfo {\n                    name: disk.name().to_string_lossy().to_string(),\n                    mount_point: disk.mount_point().to_string_lossy().to_string(),\n                    used,\n                    total,\n                    percent,\n                }\n            })\n            .collect()\n    }\n\n    /// Format bytes to human-readable format with const units\n    #[must_use]\n    pub fn format_bytes(bytes: u64) -\u003e String {\n        const UNITS: [\u0026str; 5] = [\"B\", \"KB\", \"MB\", \"GB\", \"TB\"];\n        const DIVISOR: f64 = 1024.0;\n\n        #[allow(clippy::cast_precision_loss)]\n        let mut size = bytes as f64;\n        let mut unit_index = 0;\n\n        while size \u003e= DIVISOR \u0026\u0026 unit_index \u003c UNITS.len() - 1 {\n            size /= DIVISOR;\n            unit_index += 1;\n        }\n\n        format!(\"{:.2} {}\", size, UNITS[unit_index])\n    }\n}\n\nimpl Default for ResourceMonitor {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_resource_monitor_creation() {\n        let _monitor = ResourceMonitor::new();\n    }\n\n    #[test]\n    fn test_get_stats() {\n        let mut monitor = ResourceMonitor::new();\n        let stats = monitor.get_stats();\n\n        assert!(stats.cpu_count \u003e 0);\n        assert!(stats.memory_total \u003e 0);\n        assert!(stats.cpu_usage \u003e= 0.0 \u0026\u0026 stats.cpu_usage \u003c= 100.0);\n    }\n\n    #[test]\n    fn test_format_bytes() {\n        assert_eq!(ResourceMonitor::format_bytes(0), \"0.00 B\");\n        assert_eq!(ResourceMonitor::format_bytes(1024), \"1.00 KB\");\n        assert_eq!(ResourceMonitor::format_bytes(1024 * 1024), \"1.00 MB\");\n        assert_eq!(ResourceMonitor::format_bytes(1024 * 1024 * 1024), \"1.00 GB\");\n    }\n\n    #[test]\n    fn test_default_implementation() {\n        let monitor = ResourceMonitor::default();\n        assert!(monitor.update_interval == Duration::from_millis(500));\n    }\n\n    #[test]\n    fn test_format_bytes_terabytes() {\n        let tb = 1024u64 * 1024 * 1024 * 1024;\n        assert_eq!(ResourceMonitor::format_bytes(tb), \"1.00 TB\");\n    }\n\n    #[test]\n    fn test_format_bytes_large_values() {\n        // Test values that would exceed TB\n        let large = 5u64 * 1024 * 1024 * 1024 * 1024;\n        assert_eq!(ResourceMonitor::format_bytes(large), \"5.00 TB\");\n    }\n\n    #[test]\n    fn test_format_bytes_small_values() {\n        assert_eq!(ResourceMonitor::format_bytes(100), \"100.00 B\");\n        assert_eq!(ResourceMonitor::format_bytes(512), \"512.00 B\");\n    }\n\n    #[test]\n    fn test_format_bytes_boundaries() {\n        // Just under 1KB\n        assert!(ResourceMonitor::format_bytes(1023).contains(\"B\"));\n        // Exactly 1KB\n        assert!(ResourceMonitor::format_bytes(1024).contains(\"KB\"));\n        // Just over 1KB\n        assert!(ResourceMonitor::format_bytes(1025).contains(\"KB\"));\n    }\n\n    #[test]\n    fn test_stats_caching() {\n        let mut monitor = ResourceMonitor::new();\n\n        // First call should populate cache\n        let stats1 = monitor.get_stats();\n\n        // Second call within interval should return cached\n        let stats2 = monitor.get_stats();\n\n        // Both should have same memory total (immutable)\n        assert_eq!(stats1.memory_total, stats2.memory_total);\n    }\n\n    #[test]\n    fn test_resource_stats_clone() {\n        let mut monitor = ResourceMonitor::new();\n        let stats = monitor.get_stats();\n        let cloned = stats.clone();\n\n        assert_eq!(stats.cpu_count, cloned.cpu_count);\n        assert_eq!(stats.memory_total, cloned.memory_total);\n    }\n\n    #[test]\n    fn test_memory_percent_calculation() {\n        let mut monitor = ResourceMonitor::new();\n        let stats = monitor.get_stats();\n\n        // Memory percent should be between 0 and 100\n        assert!(stats.memory_percent \u003e= 0.0);\n        assert!(stats.memory_percent \u003c= 100.0);\n    }\n\n    #[test]\n    fn test_network_stats() {\n        // Network stats should return valid values\n        let (rx, tx) = ResourceMonitor::get_network_stats();\n        // These are cumulative totals, so they should be \u003e= 0\n        assert!(rx \u003e= 0);\n        assert!(tx \u003e= 0);\n    }\n\n    #[test]\n    fn test_disk_info_struct() {\n        let disk_info = DiskInfo {\n            name: \"disk0\".to_string(),\n            mount_point: \"/\".to_string(),\n            used: 100_000_000_000,\n            total: 500_000_000_000,\n            percent: 20.0,\n        };\n\n        let cloned = disk_info.clone();\n        assert_eq!(cloned.name, \"disk0\");\n        assert_eq!(cloned.percent, 20.0);\n    }\n}\n","traces":[{"line":39,"address":[7156628],"length":1,"stats":{"Line":3}},{"line":40,"address":[6193135],"length":1,"stats":{"Line":3}},{"line":43,"address":[5899043],"length":1,"stats":{"Line":3}},{"line":44,"address":[7148892],"length":1,"stats":{"Line":3}},{"line":51,"address":[5901823,5899168],"length":1,"stats":{"Line":3}},{"line":53,"address":[6959809,6959844],"length":1,"stats":{"Line":7}},{"line":60,"address":[5899494,5899547],"length":1,"stats":{"Line":8}},{"line":61,"address":[5899560],"length":1,"stats":{"Line":4}},{"line":62,"address":[5899578],"length":1,"stats":{"Line":5}},{"line":64,"address":[5938473],"length":1,"stats":{"Line":5}},{"line":66,"address":[6960260],"length":1,"stats":{"Line":3}},{"line":69,"address":[6960425,6960353],"length":1,"stats":{"Line":6}},{"line":71,"address":[6090795,6091017,6090943],"length":1,"stats":{"Line":0}},{"line":85,"address": :{Context, Result};\nuse serde::{Deserialize, Serialize};\nuse std::collections::HashMap;\nuse std::fs;\nuse std::path::{Path, PathBuf};\n\n/// Advanced theme system supporting multiple color schemes\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Theme {\n    pub name: String,\n    pub colors: ColorPalette,\n    pub ui: UiColors,\n    pub syntax: SyntaxColors,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ColorPalette {\n    // ANSI colors\n    pub black: String,\n    pub red: String,\n    pub green: String,\n    pub yellow: String,\n    pub blue: String,\n    pub magenta: String,\n    pub cyan: String,\n    pub white: String,\n\n    // Bright colors\n    pub bright_black: String,\n    pub bright_red: String,\n    pub bright_green: String,\n    pub bright_yellow: String,\n    pub bright_blue: String,\n    pub bright_magenta: String,\n    pub bright_cyan: String,\n    pub bright_white: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct UiColors {\n    pub foreground: String,\n    pub background: String,\n    pub cursor: String,\n    pub selection: String,\n    pub border: String,\n    pub tab_active: String,\n    pub tab_inactive: String,\n    pub status_bar: String,\n    pub command_palette: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct SyntaxColors {\n    pub keyword: String,\n    pub string: String,\n    pub comment: String,\n    pub function: String,\n    pub variable: String,\n    pub error: String,\n    pub warning: String,\n}\n\n/// Built-in themes\npub struct Themes;\n\nimpl Themes {\n    /// Dark theme (default) with cool red/black color scheme\n    #[must_use]\n    pub fn dark() -\u003e Theme {\n        Theme {\n            name: \"Dark\".to_string(),\n            colors: ColorPalette {\n                black: \"#000000\".to_string(),\n                red: \"#CC5555\".to_string(),           // Darker, cooler red\n                green: \"#5A8A6A\".to_string(),         // Muted green\n                yellow: \"#B89860\".to_string(),        // Darker yellow\n                blue: \"#6A7A9A\".to_string(),          // Cool blue-gray\n                magenta: \"#B05A7A\".to_string(),       // Dark magenta-red\n                cyan: \"#5A8A8A\".to_string(),          // Dark teal\n                white: \"#C0B0B0\".to_string(),         // Slightly reddish gray\n                bright_black: \"#3A2A2A\".to_string(),  // Dark reddish-gray\n                bright_red: \"#DD6666\".to_string(),    // Medium cool red\n                bright_green: \"#6A9A7A\".to_string(),  // Muted bright green\n                bright_yellow: \"#C8A870\".to_string(), // Muted gold\n                bright_blue: \"#7A8AAA\".to_string(),   // Cool light blue\n                bright_magenta: \"#C06A8A\".to_string(), // Bright magenta-red\n                bright_cyan: \"#6A9A9A\".to_string(),   // Muted cyan\n                bright_white: \"#D0C0C0\".to_string(),  // Light reddish-gray\n            },\n            ui: UiColors {\n                foreground: \"#D0C0C0\".to_string(),      // Light reddish-gray text\n                background: \"#000000\".to_string(),      // Pure black background\n                cursor: \"#DD6666\".to_string(),          // Cool red cursor\n                selection: \"#2A1A1A\".to_string(),       // Very dark red selection\n                border: \"#4A3A3A\".to_string(),          // Dark reddish border\n                tab_active: \"#DD6666\".to_string(),      // Cool red active tab\n                tab_inactive: \"#2A1A1A\".to_string(),    // Dark inactive tab\n                status_bar: \"#1A0A0A\".to_string(),      // Almost black status bar\n                command_palette: \"#1A0A0A\".to_string(), // Almost black palette\n            },\n            syntax: SyntaxColors {\n                keyword: \"#DD6666\".to_string(),  // Cool red keywords\n                string: \"#B89860\".to_string(),   // Muted gold strings\n                comment: \"#5A4A4A\".to_string(),  // Dark gray comments\n                function: \"#B05A7A\".to_string(), // Magenta-red functions\n                variable: \"#C0B0B0\".to_string(), // Reddish-gray variables\n                error: \"#EE5555\".to_string(),    // Brighter red for errors\n                warning: \"#C8A870\".to_string(),  // Gold warnings\n            },\n        }\n    }\n\n    /// Light theme\n    #[must_use]\n    pub fn light() -\u003e Theme {\n        Theme {\n            name: \"Light\".to_string(),\n            colors: ColorPalette {\n                black: \"#000000\".to_string(),\n                red: \"#D70000\".to_string(),\n                green: \"#008700\".to_string(),\n                yellow: \"#AF8700\".to_string(),\n                blue: \"#0087FF\".to_string(),\n                magenta: \"#AF00DB\".to_string(),\n                cyan: \"#00AFAF\".to_string(),\n                white: \"#5F5F5F\".to_string(),\n                bright_black: \"#767676\".to_string(),\n                bright_red: \"#D75F00\".to_string(),\n                bright_green: \"#00AF00\".to_string(),\n                bright_yellow: \"#FFAF00\".to_string(),\n                bright_blue: \"#5FAFFF\".to_string(),\n                bright_magenta: \"#D787D7\".to_string(),\n                bright_cyan: \"#00DFFF\".to_string(),\n                bright_white: \"#FFFFFF\".to_string(),\n            },\n            ui: UiColors {\n                foreground: \"#000000\".to_string(),\n                background: \"#FFFFFF\".to_string(),\n                cursor: \"#008700\".to_string(),\n                selection: \"#B4D5FE\".to_string(),\n                border: \"#D0D0D0\".to_string(),\n                tab_active: \"#0087FF\".to_string(),\n                tab_inactive: \"#E0E0E0\".to_string(),\n                status_bar: \"#F0F0F0\".to_string(),\n                command_palette: \"#F8F8F8\".to_string(),\n            },\n            syntax: SyntaxColors {\n                keyword: \"#AF00DB\".to_string(),\n                string: \"#AF8700\".to_string(),\n                comment: \"#767676\".to_string(),\n                function: \"#0087FF\".to_string(),\n                variable: \"#000000\".to_string(),\n                error: \"#D70000\".to_string(),\n                warning: \"#D75F00\".to_string(),\n            },\n        }\n    }\n\n    /// Nord theme\n    #[must_use]\n    pub fn nord() -\u003e Theme {\n        Theme {\n            name: \"Nord\".to_string(),\n            colors: ColorPalette {\n                black: \"#3B4252\".to_string(),\n                red: \"#BF616A\".to_string(),\n                green: \"#A3BE8C\".to_string(),\n                yellow: \"#EBCB8B\".to_string(),\n                blue: \"#81A1C1\".to_string(),\n                magenta: \"#B48EAD\".to_string(),\n                cyan: \"#88C0D0\".to_string(),\n                white: \"#E5E9F0\".to_string(),\n                bright_black: \"#4C566A\".to_string(),\n                bright_red: \"#BF616A\".to_string(),\n                bright_green: \"#A3BE8C\".to_string(),\n                bright_yellow: \"#EBCB8B\".to_string(),\n                bright_blue: \"#81A1C1\".to_string(),\n                bright_magenta: \"#B48EAD\".to_string(),\n                bright_cyan: \"#8FBCBB\".to_string(),\n                bright_white: \"#ECEFF4\".to_string(),\n            },\n            ui: UiColors {\n                foreground: \"#D8DEE9\".to_string(),\n                background: \"#2E3440\".to_string(),\n                cursor: \"#88C0D0\".to_string(),\n                selection: \"#434C5E\".to_string(),\n                border: \"#4C566A\".to_string(),\n                tab_active: \"#88C0D0\".to_string(),\n                tab_inactive: \"#3B4252\".to_string(),\n                status_bar: \"#3B4252\".to_string(),\n                command_palette: \"#3B4252\".to_string(),\n            },\n            syntax: SyntaxColors {\n                keyword: \"#81A1C1\".to_string(),\n                string: \"#A3BE8C\".to_string(),\n                comment: \"#616E88\".to_string(),\n                function: \"#88C0D0\".to_string(),\n                variable: \"#D8DEE9\".to_string(),\n                error: \"#BF616A\".to_string(),\n                warning: \"#EBCB8B\".to_string(),\n            },\n        }\n    }\n\n    /// Get all built-in themes\n    #[must_use]\n    pub fn all() -\u003e HashMap\u003cString, Theme\u003e {\n        let mut themes = HashMap::new();\n        themes.insert(\"dark\".to_string(), Self::dark());\n        themes.insert(\"light\".to_string(), Self::light());\n        themes.insert(\"nord\".to_string(), Self::nord());\n        themes\n    }\n}\n\nimpl Default for Theme {\n    fn default() -\u003e Self {\n        Themes::dark()\n    }\n}\n\n/// Theme manager for dynamic theme loading and switching at runtime\n#[derive(Debug)]\npub struct ThemeManager {\n    /// Currently active theme\n    current_theme: Theme,\n    /// All available themes (built-in + custom)\n    available_themes: HashMap\u003cString, Theme\u003e,\n    /// Path to custom themes directory\n    themes_dir: Option\u003cPathBuf\u003e,\n}\n\nimpl ThemeManager {\n    /// Create a new theme manager with built-in themes\n    #[must_use]\n    pub fn new() -\u003e Self {\n        let available_themes = Themes::all();\n        let current_theme = Themes::dark();\n\n        Self {\n            current_theme,\n            available_themes,\n            themes_dir: None,\n        }\n    }\n\n    /// Create a theme manager with custom themes directory\n    ///\n    /// # Errors\n    /// Returns an error if the themes directory cannot be created or themes cannot be loaded\n    pub fn with_themes_dir\u003cP: AsRef\u003cPath\u003e\u003e(themes_dir: P) -\u003e Result\u003cSelf\u003e {\n        let themes_dir = themes_dir.as_ref().to_path_buf();\n\n        // Create themes directory if it doesn't exist\n        if !themes_dir.exists() {\n            fs::create_dir_all(\u0026themes_dir).context(\"Failed to create themes directory\")?;\n        }\n\n        let mut manager = Self::new();\n        manager.themes_dir = Some(themes_dir);\n        manager.load_custom_themes()?;\n\n        Ok(manager)\n    }\n\n    /// Load custom themes from the themes directory\n    fn load_custom_themes(\u0026mut self) -\u003e Result\u003c()\u003e {\n        let Some(ref themes_dir) = self.themes_dir else {\n            return Ok(());\n        };\n\n        if !themes_dir.exists() {\n            return Ok(());\n        }\n\n        for entry in fs::read_dir(themes_dir)? {\n            let entry = entry?;\n            let path = entry.path();\n\n            // Only process .yaml or .yml files\n            if let Some(ext) = path.extension() {\n                if ext == \"yaml\" || ext == \"yml\" {\n                    match Self::load_theme_from_file(\u0026path) {\n                        Ok(theme) =\u003e {\n                            let name = theme.name.to_lowercase();\n                            self.available_themes.insert(name, theme);\n                        }\n                        Err(e) =\u003e {\n                            // Log warning but continue loading other themes\n                            eprintln!(\"Warning: Failed to load theme from {}: {e}\", path.display());\n                        }\n                    }\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Load a theme from a YAML file\n    fn load_theme_from_file\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e Result\u003cTheme\u003e {\n        let contents = fs::read_to_string(path.as_ref()).context(\"Failed to read theme file\")?;\n        let theme: Theme = serde_yaml::from_str(\u0026contents).context(\"Failed to parse theme file\")?;\n        Ok(theme)\n    }\n\n    /// Get the current theme\n    #[must_use]\n    pub fn current(\u0026self) -\u003e \u0026Theme {\n        \u0026self.current_theme\n    }\n\n    /// Get a list of all available theme names\n    #[must_use]\n    pub fn available_theme_names(\u0026self) -\u003e Vec\u003cString\u003e {\n        let mut names: Vec\u003cString\u003e = self.available_themes.keys().cloned().collect();\n        names.sort();\n        names\n    }\n\n    /// Switch to a different theme by name (API for programmatic theme switching)\n    ///\n    /// Returns true if the theme was switched successfully, false if the theme was not found\n    pub fn switch_theme(\u0026mut self, name: \u0026str) -\u003e bool {\n        let name_lower = name.to_lowercase();\n        if let Some(theme) = self.available_themes.get(\u0026name_lower) {\n            self.current_theme = theme.clone();\n            true\n        } else {\n            false\n        }\n    }\n\n    /// Cycle to the next theme in alphabetical order\n    pub fn next_theme(\u0026mut self) {\n        let names = self.available_theme_names();\n        if names.is_empty() {\n            return;\n        }\n\n        let current_name = self.current_theme.name.to_lowercase();\n        // If current theme isn't in the list (e.g., custom theme was removed),\n        // start from the first theme\n        let current_idx = names\n            .iter()\n            .position(|n| n == \u0026current_name)\n            .unwrap_or(names.len().saturating_sub(1));\n        let next_idx = (current_idx + 1) % names.len();\n\n        if let Some(theme) = self.available_themes.get(\u0026names[next_idx]) {\n            self.current_theme = theme.clone();\n        }\n    }\n\n    /// Cycle to the previous theme in alphabetical order\n    pub fn prev_theme(\u0026mut self) {\n        let names = self.available_theme_names();\n        if names.is_empty() {\n            return;\n        }\n\n        let current_name = self.current_theme.name.to_lowercase();\n        // If current theme isn't in the list, start from the first theme\n        let current_idx = names.iter().position(|n| n == \u0026current_name).unwrap_or(0);\n        let prev_idx = if current_idx == 0 {\n            names.len() - 1\n        } else {\n            current_idx - 1\n        };\n\n        if let Some(theme) = self.available_themes.get(\u0026names[prev_idx]) {\n            self.current_theme = theme.clone();\n        }\n    }\n\n    /// Add a custom theme (API for theme management)\n    pub fn add_theme(\u0026mut self, theme: Theme) {\n        let name = theme.name.to_lowercase();\n        self.available_themes.insert(name, theme);\n    }\n\n    /// Save a theme to the custom themes directory\n    ///\n    /// # Errors\n    /// Returns an error if the themes directory is not set or the file cannot be written\n    pub fn save_theme(\u0026self, theme: \u0026Theme) -\u003e Result\u003c()\u003e {\n        let themes_dir = self\n            .themes_dir\n            .as_ref()\n            .context(\"Themes directory not configured\")?;\n\n        let filename = format!(\"{}.yaml\", theme.name.to_lowercase().replace(' ', \"_\"));\n        let path = themes_dir.join(filename);\n\n        let contents = serde_yaml::to_string(theme).context(\"Failed to serialize theme\")?;\n        fs::write(\u0026path, contents).context(\"Failed to write theme file\")?;\n\n        Ok(())\n    }\n\n    /// Get the default themes directory path\n    ///\n    /// # Errors\n    /// Returns an error if the home directory cannot be determined\n    pub fn default_themes_dir() -\u003e Result\u003cPathBuf\u003e {\n        let home = dirs::home_dir().context(\"Failed to get home directory\")?;\n        Ok(home.join(\".furnace\").join(\"themes\"))\n    }\n}\n\nimpl Default for ThemeManager {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_theme_manager_creation() {\n        let manager = ThemeManager::new();\n        assert_eq!(manager.current().name, \"Dark\");\n        assert!(!manager.available_theme_names().is_empty());\n    }\n\n    #[test]\n    fn test_theme_switching() {\n        let mut manager = ThemeManager::new();\n\n        assert!(manager.switch_theme(\"light\"));\n        assert_eq!(manager.current().name, \"Light\");\n\n        assert!(manager.switch_theme(\"nord\"));\n        assert_eq!(manager.current().name, \"Nord\");\n\n        assert!(!manager.switch_theme(\"nonexistent\"));\n    }\n\n    #[test]\n    fn test_theme_cycling() {\n        let mut manager = ThemeManager::new();\n        let initial_name = manager.current().name.clone();\n\n        manager.next_theme();\n        let next_name = manager.current().name.clone();\n\n        // Should have changed to a different theme\n        assert_ne!(initial_name, next_name);\n\n        manager.prev_theme();\n        // Should be back to initial\n        assert_eq!(manager.current().name, initial_name);\n    }\n\n    #[test]\n    fn test_available_themes() {\n        let manager = ThemeManager::new();\n        let names = manager.available_theme_names();\n\n        assert!(names.contains(\u0026\"dark\".to_string()));\n        assert!(names.contains(\u0026\"light\".to_string()));\n        assert!(names.contains(\u0026\"nord\".to_string()));\n    }\n\n    #[test]\n    fn test_default_implementation() {\n        let manager = ThemeManager::default();\n        assert_eq!(manager.current().name, \"Dark\");\n    }\n\n    #[test]\n    fn test_dark_theme() {\n        let theme = Themes::dark();\n        assert_eq!(theme.name, \"Dark\");\n        assert!(!theme.ui.foreground.is_empty());\n        assert!(!theme.ui.background.is_empty());\n        assert!(!theme.ui.cursor.is_empty());\n    }\n\n    #[test]\n    fn test_light_theme() {\n        let theme = Themes::light();\n        assert_eq!(theme.name, \"Light\");\n        assert!(!theme.ui.foreground.is_empty());\n        assert!(!theme.ui.background.is_empty());\n    }\n\n    #[test]\n    fn test_nord_theme() {\n        let theme = Themes::nord();\n        assert_eq!(theme.name, \"Nord\");\n        assert!(!theme.ui.foreground.is_empty());\n        assert!(!theme.colors.black.is_empty());\n    }\n\n    #[test]\n    fn test_theme_colors_are_valid_hex() {\n        let theme = Themes::dark();\n        // All color values should be valid hex\n        assert!(theme.ui.foreground.starts_with('#'));\n        assert!(theme.ui.background.starts_with('#'));\n        assert!(theme.colors.red.starts_with('#'));\n    }\n\n    #[test]\n    fn test_cycle_through_all_themes() {\n        let mut manager = ThemeManager::new();\n        let num_themes = manager.available_theme_names().len();\n\n        let initial_theme = manager.current().name.clone();\n\n        // Cycle through all themes\n        for _ in 0..num_themes {\n            manager.next_theme();\n        }\n\n        // Should be back to initial after full cycle\n        assert_eq!(manager.current().name, initial_theme);\n    }\n\n    #[test]\n    fn test_prev_theme_wraps() {\n        let mut manager = ThemeManager::new();\n\n        // Go to first theme\n        manager.switch_theme(\"dark\");\n        let initial = manager.current().name.clone();\n\n        // Go prev should wrap to last\n        manager.prev_theme();\n        let after_prev = manager.current().name.clone();\n\n        // Should have wrapped to a different theme\n        assert_ne!(initial, after_prev);\n    }\n\n    #[test]\n    fn test_theme_syntax_colors() {\n        let theme = Themes::dark();\n        assert!(!theme.syntax.keyword.is_empty());\n        assert!(!theme.syntax.string.is_empty());\n        assert!(!theme.syntax.comment.is_empty());\n        assert!(!theme.syntax.function.is_empty());\n        assert!(!theme.syntax.variable.is_empty());\n        assert!(!theme.syntax.error.is_empty());\n        assert!(!theme.syntax.warning.is_empty());\n    }\n\n    #[test]\n    fn test_switch_theme_case_insensitive() {\n        let mut manager = ThemeManager::new();\n\n        // Theme names are lowercased\n        assert!(manager.switch_theme(\"Dark\")); // Doesn't exist as \"Dark\"\n                                               // Note: switch_theme uses lowercase lookup\n    }\n\n    #[test]\n    fn test_default_themes_dir() {\n        let result = ThemeManager::default_themes_dir();\n        // Should succeed if home directory is available\n        if let Ok(path) = result {\n            assert!(path.to_string_lossy().contains(\"furnace\"));\n            assert!(path.to_string_lossy().contains(\"themes\"));\n        }\n    }\n}\n","traces":[{"line":69,"address":[5877614,5869968],"length":1,"stats":{"Line":4}},{"line":72,"address":[6937393],"length":1,"stats":{"Line":4}},{"line":90,"address":[6048042],"length":1,"stats":{"Line":4}},{"line":101,"address":[5346831],"length":1,"stats":{"Line":4}},{"line":115,"address":[6058832,6066483],"length":1,"stats":{"Line":5}},{"line":118,"address":[6952662],"length":1,"stats":{"Line":5}},{"line":136,"address":[6954463],"length":1,"stats":{"Line":5}},{"line":147,"address":[6955732],"length":1,"stats":{"Line":5}},{"line":161,"address":[5356270,5348656],"length":1,"stats":{"Line":5}},{"line":164,"address":[5351393],"length":1,"stats":{"Line":5}},{"line":182,"address":[6055706],"length":1,"stats":{"Line":5}},{"line":193,"address":[6056975],"length":1,"stats":{"Line":5}},{"line":207,"address":[5340016,5341005],"length":1,"stats":{"Line":3}},{"line":209,"address":[5869907,5869185],"length":1,"stats":{"Line":4}},{"line":210,"address":[5340947,5340462],"length":1,"stats":{"Line":5}},{"line":211,"address":[6043142,6043401],"length":1,"stats":{"Line":5}},{"line":212,"address":[6934355],"length":1,"stats":{"Line":5}},{"line":217,"address":[6033888],"length":1,"stats":{"Line":0}},{"line":218,"address":[6925764],"length":1,"stats":{"Line":0}},{"line":236,"address":[6933232,6933368,6927320],"length":1,"stats":{"Line":1}},{"line":237,"address":[5915229,5916079,5911537,5913613,5910899,5917117,5915597,5912134],"length":1,"stats":{"Line":17}},{"line":238,"address":[7146733,7147191]," esult.is_ok(), \"Failed to read from shell\");\n\n        // Verify we got some output\n        let bytes_read = read_result.unwrap();\n        assert!(bytes_read \u003e 0, \"No output from shell\");\n    }\n\n    #[tokio::test]\n    async fn test_shell_resize() {\n        let shell = if cfg!(windows) { \"cmd.exe\" } else { \"sh\" };\n\n        let session = ShellSession::new(shell, None, 24, 80).unwrap();\n\n        // Test resizing\n        let resize_result = session.resize(30, 100).await;\n        assert!(resize_result.is_ok(), \"Failed to resize PTY\");\n    }\n}\n\n/// Test ANSI parser functionality\n#[cfg(test)]\nmod ansi_parser_tests {\n    use furnace::terminal::ansi_parser::AnsiParser;\n\n    #[test]\n    fn test_ansi_parser_basic_colors() {\n        let result = AnsiParser::parse(\"\\x1b[31mRed Text\\x1b[0m\");\n\n        assert!(!result.is_empty(), \"No lines produced\");\n    }\n\n    #[test]\n    fn test_ansi_parser_rgb_colors() {\n        // RGB color: ESC[38;2;R;G;Bm\n        let result = AnsiParser::parse(\"\\x1b[38;2;255;100;50mRGB Text\\x1b[0m\");\n\n        assert!(!result.is_empty(), \"No lines produced for RGB\");\n    }\n\n    #[test]\n    fn test_ansi_parser_multiple_attributes() {\n        // Bold + Red + Underline\n        let result = AnsiParser::parse(\"\\x1b[1;31;4mBold Red Underlined\\x1b[0m\");\n\n        assert!(\n            !result.is_empty(),\n            \"No lines produced for multiple attributes\"\n        );\n    }\n}\n\n/// Test color functionality\n#[cfg(test)]\nmod color_tests {\n    use furnace::colors::TrueColor;\n\n    #[test]\n    fn test_true_color_from_hex() {\n        let color = TrueColor::from_hex(\"#FF0000\");\n        assert!(color.is_ok(), \"Failed to parse hex color\");\n        let c = color.unwrap();\n        assert_eq!(c.r, 255);\n        assert_eq!(c.g, 0);\n        assert_eq!(c.b, 0);\n    }\n\n    #[test]\n    fn test_true_color_blending() {\n        let color1 = TrueColor::new(255, 0, 0); // Red\n        let color2 = TrueColor::new(0, 0, 255); // Blue\n\n        let blended = color1.blend(color2, 0.5);\n        // Should be purple-ish (127, 0, 127)\n        assert!(blended.r \u003e 100 \u0026\u0026 blended.r \u003c 150);\n        assert!(blended.b \u003e 100 \u0026\u0026 blended.b \u003c 150);\n    }\n\n    #[test]\n    fn test_true_color_luminance() {\n        let white = TrueColor::new(255, 255, 255);\n        let black = TrueColor::new(0, 0, 0);\n\n        assert!(white.luminance() \u003e black.luminance());\n        assert!(white.luminance() \u003e 0.9);\n        assert!(black.luminance() \u003c 0.1);\n    }\n}\n\n/// Test configuration functionality\n#[cfg(test)]\nmod config_tests {\n    use furnace::config::Config;\n    use tempfile::tempdir;\n\n    #[test]\n    fn test_default_config_values() {\n        let config = Config::default();\n\n        // Verify default values\n        assert!(!config.terminal.enable_tabs);\n        assert!(!config.terminal.enable_split_pane);\n        assert_eq!(config.terminal.scrollback_lines, 10000);\n        assert!(config.terminal.hardware_acceleration);\n    }\n\n    #[test]\n    fn test_config_load() {\n        let dir = tempdir().unwrap();\n        let config_path = dir.path().join(\"test_config.lua\");\n\n        // Create a Lua config\n        let lua_config = r\"\nconfig = {\n    terminal = {\n        max_history = 5000\n    }\n}\n\";\n        std::fs::write(\u0026config_path, lua_config).unwrap();\n\n        // Load and verify\n        let loaded = Config::load_from_file(\u0026config_path).unwrap();\n        assert_eq!(loaded.terminal.max_history, 5000);\n    }\n}\n\n/// Test UI components\n#[cfg(test)]\nmod ui_tests {\n    use furnace::ui::{\n        autocomplete::Autocomplete, resource_monitor::ResourceMonitor, themes::ThemeManager,\n    };\n\n    #[test]\n    fn test_resource_monitor_creation() {\n        let mut monitor = ResourceMonitor::new();\n        // Should be able to get stats\n        let stats = monitor.get_stats();\n        // Stats is a struct with CPU/memory info\n        assert!(stats.cpu_usage \u003e= 0.0);\n        assert!(stats.memory_used \u003e 0);\n    }\n\n    #[test]\n    fn test_autocomplete_creation() {\n        let mut autocomplete = Autocomplete::new();\n        // Should have common commands cached\n        let suggestions = autocomplete.get_suggestions(\"gi\");\n        assert!(!suggestions.is_empty(), \"No autocomplete suggestions\");\n    }\n\n    #[test]\n    fn test_theme_manager() {\n        let manager = ThemeManager::new();\n        let themes = manager.available_theme_names();\n\n        // Should have at least 3 built-in themes\n        assert!(themes.len() \u003e= 3, \"Not enough themes available\");\n        assert!(themes.contains(\u0026\"dark\".to_string()));\n        assert!(themes.contains(\u0026\"light\".to_string()));\n        assert!(themes.contains(\u0026\"nord\".to_string()));\n    }\n}\n\n/// Test session management\n#[cfg(test)]\nmod session_tests {\n    use furnace::session::SessionManager;\n\n    #[test]\n    fn test_session_manager_creation() {\n        let manager = SessionManager::new();\n        assert!(manager.is_ok(), \"Failed to create session manager\");\n    }\n}\n\n/// Test keybindings\n#[cfg(test)]\nmod keybinding_tests {\n    use furnace::keybindings::KeybindingManager;\n\n    #[test]\n    fn test_keybinding_manager_creation() {\n        let _manager = KeybindingManager::new();\n        // Should create without errors\n    }\n}\n\n/// Test progress bar\n#[cfg(test)]\nmod progress_bar_tests {\n    use furnace::progress_bar::ProgressBar;\n\n    #[test]\n    fn test_progress_bar_start_stop() {\n        let mut bar = ProgressBar::new();\n        assert!(!bar.visible);\n\n        bar.start(\"test command\".to_string());\n        assert!(bar.visible);\n\n        bar.stop();\n        assert!(!bar.visible);\n    }\n}\n\n/// Test terminal local echo functionality\n#[cfg(test)]\nmod local_echo_tests {\n    use furnace::config::Config;\n    use furnace::terminal::Terminal;\n\n    #[test]\n    fn test_terminal_with_local_echo() {\n        // Create a terminal with default config\n        let config = Config::default();\n        let terminal = Terminal::new(config);\n\n        // Should create successfully with local echo support\n        assert!(terminal.is_ok(), \"Terminal creation failed\");\n\n        // The terminal should be able to handle command buffers for local echo\n        // This is verified by the successful creation and internal structure\n    }\n\n    #[test]\n    fn test_command_buffer_tracking() {\n        // Verify that the Terminal struct has the necessary command_buffers field\n        // This is an indirect test since command_buffers is private\n        let config = Config::default();\n        let terminal = Terminal::new(config);\n\n        assert!(\n            terminal.is_ok(),\n            \"Terminal should track command buffers internally\"\n        );\n    }\n}\n\n/// Test PowerShell prompt handling with ANSI codes\n#[cfg(test)]\nmod powershell_prompt_tests {\n    use furnace::terminal::ansi_parser::AnsiParser;\n\n    #[test]\n    fn test_simple_prompt_without_newline() {\n        // PowerShell prompt without trailing newline\n        let output = \"PS C:\\\\Users\\\\test\u003e \";\n        let lines = AnsiParser::parse(output);\n\n        // Should have 1 line with the prompt\n        assert_eq!(lines.len(), 1, \"Expected 1 line for prompt without newline\");\n\n        // Verify the prompt content is preserved\n        let text: String = lines[0]\n            .spans\n            .iter()\n            .map(|span| span.content.as_ref())\n            .collect();\n        assert!(\n            text.contains(\"PS C:\\\\Users\\\\test\u003e\"),\n            \"Prompt content not preserved\"\n        );\n    }\n\n    #[test]\n    fn test_prompt_with_newline() {\n        // PowerShell prompt with trailing newline\n        let output = \"PS C:\\\\Users\\\\test\u003e\\n\";\n        let lines = AnsiParser::parse(output);\n\n        // Should have at least 1 line (the prompt), possibly 2 if empty line is added\n        assert!(\n            !lines.is_empty(),\n            \"Expected at least 1 line for prompt with newline\"\n        );\n\n        // Verify the prompt is in the first line\n        let text: String = lines[0]\n            .spans\n            .iter()\n            .map(|span| span.content.as_ref())\n            .collect();\n        assert!(\n            text.contains(\"PS C:\\\\Users\\\\test\u003e\"),\n            \"Prompt content not preserved\"\n        );\n    }\n\n    #[test]\n    fn test_clear_screen_before_prompt() {\n        // Clear screen followed by prompt\n        let output = \"\\x1b[2JPS C:\\\\Users\\\\test\u003e \";\n        let lines = AnsiParser::parse(output);\n\n        // Should have the prompt visible after clear screen\n        assert!(\n            !lines.is_empty(),\n            \"Expected prompt to be visible after clear screen\"\n        );\n\n        // Verify the prompt content is preserved\n        let text: String = lines[0]\n            .spans\n            .iter()\n            .map(|span| span.content.as_ref())\n            .collect();\n        assert!(\n            text.contains(\"PS C:\\\\Users\\\\test\u003e\"),\n            \"Prompt should be visible after clear screen, got lines: {:?}\",\n            lines\n        );\n    }\n\n    #[test]\n    fn test_prompt_followed_by_clear_screen() {\n        // Prompt followed by clear screen\n        // For full terminal emulation, clear screen should actually clear the display\n        let output = \"PS C:\\\\Users\\\\test\u003e \\x1b[2J\";\n        let lines = AnsiParser::parse(output);\n\n        // After implementing proper clear screen: the display should be cleared\n        // The terminal buffer is erased, showing empty lines\n        // Applications like vim, htop depend on ESC[2J actually clearing\n        assert!(\n            !lines.is_e     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      return e(
        'code',
        {
          className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          title: trace ? JSON.stringify(trace.stats, null, 2) : null,
        },
        line,
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
