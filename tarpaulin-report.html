erive(Debug, Clone, Serialize, Deserialize)]\npub enum Action {\n    // Terminal actions\n    NewTab,\n    CloseTab,\n    NextTab,\n    PrevTab,\n    SplitHorizontal,\n    SplitVertical,\n\n    // Navigation\n    FocusNextPane,\n    FocusPrevPane,\n\n    // Editing\n    Copy,\n    Paste,\n    SelectAll,\n    Clear,\n\n    // Search\n    Search,\n    SearchNext,\n    SearchPrev,\n\n    // Command palette \u0026 features\n    ToggleAutocomplete,\n    NextTheme,\n    PrevTheme,\n\n    // Resource monitor\n    ToggleResourceMonitor,\n\n    // Session management\n    SaveSession,\n    LoadSession,\n    ListSessions,\n\n    // Shell integration\n    SendToShell(String),\n    ExecuteCommand(String),\n\n    // Custom\n    Custom(String),\n\n    // Lua execution\n    ExecuteLua(String),\n}\n\n/// Shell integration features (infrastructure for future OSC 7/133 support)\n#[derive(Debug, Clone)]\n#[allow(clippy::struct_excessive_bools)]\npub struct ShellIntegration {\n    /// OSC sequences support\n    pub osc_sequences: bool,\n\n    /// Shell prompt detection\n    pub prompt_detection: bool,\n\n    /// Directory tracking\n    pub directory_tracking: bool,\n\n    /// Command tracking\n    pub command_tracking: bool,\n\n    /// Current working directory\n    pub current_dir: Option\u003cString\u003e,\n\n    /// Last command\n    pub last_command: Option\u003cString\u003e,\n}\n\nimpl KeybindingManager {\n    /// Create new keybinding manager with defaults\n    #[must_use]\n    pub fn new() -\u003e Self {\n        let mut manager = Self {\n            bindings: HashMap::new(),\n            shell_integration: ShellIntegration::default(),\n        };\n\n        manager.load_defaults();\n        manager\n    }\n\n    /// Load default keybindings\n    fn load_defaults(\u0026mut self) {\n        // Tab management\n        self.add_binding(\"t\", \u0026[\"Ctrl\"], Action::NewTab);\n        self.add_binding(\"w\", \u0026[\"Ctrl\"], Action::CloseTab);\n\n        // BUG FIX #7: Ctrl+Tab is not reliably supported by crossterm on all terminals\n        // Most terminals intercept Ctrl+Tab before it reaches the application.\n        // Using Ctrl+PageDown/PageUp or Alt+number is more reliable, but we keep\n        // these bindings as they work in some terminals (e.g., Windows Terminal).\n        // Users can remap these in their config if needed.\n        self.add_binding(\"Tab\", \u0026[\"Ctrl\"], Action::NextTab);\n        self.add_binding(\"Tab\", \u0026[\"Ctrl\", \"Shift\"], Action::PrevTab);\n\n        // Pane management\n        self.add_binding(\"h\", \u0026[\"Ctrl\", \"Shift\"], Action::SplitHorizontal);\n        self.add_binding(\"v\", \u0026[\"Ctrl\", \"Shift\"], Action::SplitVertical);\n        self.add_binding(\"o\", \u0026[\"Ctrl\"], Action::FocusNextPane);\n\n        // Editing\n        self.add_binding(\"c\", \u0026[\"Ctrl\", \"Shift\"], Action::Copy);\n        self.add_binding(\"v\", \u0026[\"Ctrl\", \"Shift\"], Action::Paste);\n        self.add_binding(\"a\", \u0026[\"Ctrl\", \"Shift\"], Action::SelectAll);\n        self.add_binding(\"l\", \u0026[\"Ctrl\"], Action::Clear);\n\n        // Search\n        self.add_binding(\"f\", \u0026[\"Ctrl\"], Action::Search);\n        self.add_binding(\"n\", \u0026[\"Ctrl\"], Action::SearchNext);\n        self.add_binding(\"N\", \u0026[\"Ctrl\", \"Shift\"], Action::SearchPrev);\n\n        // Features\n        self.add_binding(\"r\", \u0026[\"Ctrl\"], Action::ToggleResourceMonitor);\n        self.add_binding(\"Tab\", \u0026[\"Alt\"], Action::ToggleAutocomplete);\n        self.add_binding(\"]\", \u0026[\"Ctrl\"], Action::NextTheme);\n        self.add_binding(\"[\", \u0026[\"Ctrl\"], Action::PrevTheme);\n\n        // Session management\n        // BUG FIX #16: Removed duplicate Ctrl+O binding\n        // Ctrl+O is used for FocusNextPane above\n        self.add_binding(\"s\", \u0026[\"Ctrl\"], Action::SaveSession);\n        self.add_binding(\"l\", \u0026[\"Ctrl\", \"Shift\"], Action::LoadSession);\n    }\n\n    /// Add a keybinding\n    pub fn add_binding(\u0026mut self, key: \u0026str, modifiers: \u0026[\u0026str], action: Action) {\n        let binding = KeyBinding {\n            key: key.to_string(),\n            modifiers: modifiers\n                .iter()\n                .map(std::string::ToString::to_string)\n                .collect(),\n        };\n        self.bindings.insert(binding, action);\n    }\n\n    /// Parse and add a keybinding from a config string like \"Ctrl+T\" or \"Ctrl+Shift+C\"\n    ///\n    /// # Arguments\n    /// * `combo` - Key combination string (e.g., \"Ctrl+T\", \"Ctrl+Shift+V\", \"Alt+F\")\n    /// * `action` - Action to bind to this combination\n    ///\n    /// # Returns\n    /// Ok(()) if binding was added successfully, Err if combo string is invalid\n    ///\n    /// # Examples\n    /// ```ignore\n    /// manager.add_binding_from_string(\"Ctrl+T\", Action::NewTab)?;\n    /// manager.add_binding_from_string(\"Ctrl+Shift+C\", Action::Copy)?;\n    /// ```\n    pub fn add_binding_from_string(\u0026mut self, combo: \u0026str, action: Action) -\u003e Result\u003c(), String\u003e {\n        if combo.is_empty() {\n            return Err(\"Empty key combination\".to_string());\n        }\n\n        let parts: Vec\u003c\u0026str\u003e = combo.split('+').map(str::trim).collect();\n        if parts.is_empty() {\n            return Err(\"Invalid key combination format\".to_string());\n        }\n\n        // Last part is the key, everything before is modifiers\n        let key = match parts.last() {\n            Some(k) =\u003e *k,\n            None =\u003e return Err(\"Invalid key combination format\".to_string()),\n        };\n        let modifiers: Vec\u003c\u0026str\u003e = parts[..parts.len().saturating_sub(1)].to_vec();\n\n        // Validate and normalize modifiers\n        let normalized_mods: Vec\u003c\u0026str\u003e = modifiers\n            .iter()\n            .filter_map(|m| {\n                match m.to_lowercase().as_str() {\n                    \"ctrl\" | \"control\" =\u003e Some(\"Ctrl\"),\n                    \"shift\" =\u003e Some(\"Shift\"),\n                    \"alt\" =\u003e Some(\"Alt\"),\n                    _ =\u003e None, // Ignore unknown modifiers\n                }\n            })\n            .collect();\n\n        // Normalize key name\n        let key_lower = key.to_lowercase();\n        let normalized_key = match key_lower.as_str() {\n            \"tab\" =\u003e \"Tab\",\n            \"enter\" | \"return\" =\u003e \"Enter\",\n            \"esc\" | \"escape\" =\u003e \"Esc\",\n            \"up\" =\u003e \"Up\",\n            \"down\" =\u003e \"Down\",\n            \"left\" =\u003e \"Left\",\n            \"right\" =\u003e \"Right\",\n            \"space\" =\u003e \" \",\n            // Single character - use character count for UTF-8 safety\n            k if k.chars().count() == 1 =\u003e {\n                if let Some(c) = k.chars().next() {\n                    // For single characters, convert to lowercase for consistency\n                    let char_str = c.to_lowercase().to_string();\n                    self.add_binding(\u0026char_str, \u0026normalized_mods, action);\n                    return Ok(());\n                }\n                k\n            }\n            k =\u003e k,\n        };\n\n        self.add_binding(normalized_key, \u0026normalized_mods, action);\n        Ok(())\n    }\n\n    /// Get action for key event\n    ///\n    /// BUG FIX #6: Normalize character keys to lowercase for consistent matching.\n    /// When Shift is pressed with Ctrl (e.g., Ctrl+Shift+C), crossterm provides\n    /// an uppercase 'C', but our bindings use lowercase 'c'. This function normalizes\n    /// the key to lowercase for character keys while preserving Shift in modifiers.\n    #[must_use]\n    pub fn get_action(\u0026self, code: KeyCode, modifiers: KeyModifiers) -\u003e Option\u003cAction\u003e {\n        let key_str = match code {\n            // BUG FIX #6: Normalize character keys to lowercase for case-insensitive matching\n            // This allows Ctrl+Shift+C to match a binding defined as ctrl+shift+c\n            KeyCode::Char(c) =\u003e c.to_lowercase().to_string(),\n            KeyCode::Tab =\u003e \"Tab\".to_string(),\n            KeyCode::Enter =\u003e \"Enter\".to_string(),\n            KeyCode::Esc =\u003e \"Esc\".to_string(),\n            KeyCode::Up =\u003e \"Up\".to_string(),\n            KeyCode::Down =\u003e \"Down\".to_string(),\n            KeyCode::Left =\u003e \"Left\".to_string(),\n            KeyCode::Right =\u003e \"Right\".to_string(),\n            _ =\u003e return None,\n        };\n\n        let mut mod_vec = Vec::new();\n        if modifiers.contains(KeyModifiers::CONTROL) {\n            mod_vec.push(\"Ctrl\".to_string());\n        }\n        if modifiers.contains(KeyModifiers::SHIFT) {\n            mod_vec.push(\"Shift\".to_string());\n        }\n        if modifiers.contains(KeyModifiers::ALT) {\n            mod_vec.push(\"Alt\".to_string());\n        }\n\n        let binding = KeyBinding {\n            key: key_str,\n            modifiers: mod_vec,\n        };\n\n        self.bindings.get(\u0026binding).cloned()\n    }\n\n    /// Enable shell integration features (future OSC parsing support)\n    pub fn enable_shell_integration(\u0026mut self, feature: ShellIntegrationFeature, enabled: bool) {\n        match feature {\n            ShellIntegrationFeature::OscSequences =\u003e self.shell_integration.osc_sequences = enabled,\n            ShellIntegrationFeature::PromptDetection =\u003e {\n                self.shell_integration.prompt_detection = enabled;\n            }\n            ShellIntegrationFeature::DirectoryTracking =\u003e {\n                self.shell_integration.directory_tracking = enabled;\n            }\n            ShellIntegrationFeature::CommandTracking =\u003e {\n                self.shell_integration.command_tracking = enabled;\n            }\n        }\n    }\n\n    /// Update current directory from shell (future OSC 7 support)\n    pub fn update_directory(\u0026mut self, dir: String) {\n        self.shell_integration.current_dir = Some(dir);\n    }\n\n    /// Update last command from shell (future OSC 133 support)\n    pub fn update_last_command(\u0026mut self, command: String) {\n        self.shell_integration.last_command = Some(command);\n    }\n\n    /// Get shell integration status\n    #[must_use]\n    pub fn shell_integration(\u0026self) -\u003e \u0026ShellIntegration {\n        \u0026self.shell_integration\n    }\n}\n\n/// Shell integration features (future API for OSC parsing)\n#[derive(Debug, Clone, Copy)]\npub enum ShellIntegrationFeature {\n    OscSequences,\n    PromptDetection,\n    DirectoryTracking,\n    CommandTracking,\n}\n\nimpl Default for ShellIntegration {\n    fn default() -\u003e Self {\n        Self {\n            osc_sequences: true,\n            prompt_detection: true,\n            directory_tracking: true,\n            command_tracking: true,\n            current_dir: None,\n            last_command: None,\n        }\n    }\n}\n\nimpl Default for KeybindingManager {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_keybinding_manager() {\n        let manager = KeybindingManager::new();\n\n        let action = manager.get_action(KeyCode::Char('t'), KeyModifiers::CONTROL);\n\n        assert!(matches!(action, Some(Action::NewTab)));\n    }\n\n    #[test]\n    fn test_shell_integration() {\n        let mut manager = KeybindingManager::new();\n        manager.update_directory(\"/home/user\".to_string());\n\n        assert_eq!(\n            manager.shell_integration().current_dir,\n            Some(\"/home/user\".to_string())\n        );\n    }\n\n    #[test]\n    fn test_add_binding_from_string() {\n        let mut manager = KeybindingManager::new();\n        manager\n            .add_binding_from_string(\"Ctrl+Shift+X\", Action::Clear)\n            .unwrap();\n\n        let action = manager.get_action(\n            KeyCode::Char('x'),\n            KeyModifiers::CONTROL | KeyModifiers::SHIFT,\n        );\n        assert!(matches!(action, Some(Action::Clear)));\n    }\n\n    #[test]\n    fn test_add_binding_with_alt() {\n        let mut manager = KeybindingManager::new();\n        manager\n            .add_binding_from_string(\"Alt+Tab\", Action::ToggleAutocomplete)\n            .unwrap();\n\n        let action = manager.get_action(KeyCode::Tab, KeyModifiers::ALT);\n        assert!(matches!(action, Some(Action::ToggleAutocomplete)));\n    }\n\n    #[test]\n    fn test_get_action_special_keys() {\n        let _manager = KeybindingManager::new();\n\n        // Test that special keys can be bound\n        let mut test_manager = KeybindingManager::new();\n        test_manager\n            .add_binding_from_string(\"Ctrl+Enter\", Action::Clear)\n            .unwrap();\n\n        let action = test_manager.get_action(KeyCode::Enter, KeyModifiers::CONTROL);\n        assert!(matches!(action, Some(Action::Clear)));\n    }\n\n    #[test]\n    fn test_get_action_arrow_keys() {\n        let mut manager = KeybindingManager::new();\n        manager\n            .add_binding_from_string(\"Ctrl+Up\", Action::PrevTheme)\n            .unwrap();\n        manager\n            .add_binding_from_string(\"Ctrl+Down\", Action::NextTheme)\n            .unwrap();\n\n        assert!(matches!(\n            manager.get_action(KeyCode::Up, KeyModifiers::CONTROL),\n            Some(Action::PrevTheme)\n        ));\n        assert!(matches!(\n            manager.get_action(KeyCode::Down, KeyModifiers::CONTROL),\n            Some(Action::NextTheme)\n        ));\n    }\n\n    #[test]\n    fn test_update_last_command() {\n        let mut manager = KeybindingManager::new();\n        manager.update_last_command(\"ls -la\".to_string());\n\n        assert_eq!(\n            manager.shell_integration().last_command,\n            Some(\"ls -la\".to_string())\n        );\n    }\n\n    #[test]\n    fn test_enable_shell_integration() {\n        let mut manager = KeybindingManager::new();\n\n        manager.enable_shell_integration(ShellIntegrationFeature::OscSequences, false);\n        assert!(!manager.shell_integration().osc_sequences);\n\n        manager.enable_shell_integration(ShellIntegrationFeature::PromptDetection, false);\n        assert!(!manager.shell_integration().prompt_detection);\n\n        manager.enable_shell_integration(ShellIntegrationFeature::DirectoryTracking, false);\n        assert!(!manager.shell_integration().directory_tracking);\n\n        manager.enable_shell_integration(ShellIntegrationFeature::CommandTracking, false);\n        assert!(!manager.shell_integration().command_tracking);\n    }\n\n    #[test]\n    fn test_default_keybindings() {\n        let manager = KeybindingManager::new();\n\n        // Test all default keybindings\n        assert!(matches!(\n            manager.get_action(KeyCode::Char('w'), KeyModifiers::CONTROL),\n            Some(Action::CloseTab)\n        ));\n        assert!(matches!(\n            manager.get_action(KeyCode::Tab, KeyModifiers::CONTROL),\n            Some(Action::NextTab)\n        ));\n        assert!(matches!(\n            manager.get_action(KeyCode::Char('r'), KeyModifiers::CONTROL),\n            Some(Action::ToggleResourceMonitor)\n        ));\n        assert!(matches!(\n            manager.get_action(KeyCode::Char('f'), KeyModifiers::CONTROL),\n            Some(Action::Search)\n        ));\n    }\n\n    #[test]\n    fn test_case_insensitive_matching() {\n        let manager = KeybindingManager::new();\n\n        // Ctrl+T should work regardless of case\n        let action_lower = manager.get_action(KeyCode::Char('t'), KeyModifiers::CONTROL);\n        assert!(matches!(action_lower, Some(Action::NewTab)));\n    }\n\n    #[test]\n    fn test_unknown_key_returns_none() {\n        let manager = KeybindingManager::new();\n\n        // Keys without bindings should return None\n        let action = manager.get_action(KeyCode::F(1), KeyModifiers::NONE);\n        assert!(action.is_none());\n    }\n\n    #[test]\n    fn test_execute_lua_action() {\n        let mut manager = KeybindingManager::new();\n        let lua_code = \"print('hello')\".to_string();\n        manager\n            .add_binding_from_string(\"Ctrl+Shift+P\", Action::ExecuteLua(lua_code.clone()))\n            .unwrap();\n\n        let action = manager.get_action(\n            KeyCode::Char('p'),\n            KeyModifiers::CONTROL | KeyModifiers::SHIFT,\n        );\n        assert!(matches!(action, Some(Action::ExecuteLua(_))));\n    }\n\n    #[test]\n    fn test_shell_integration_default() {\n        let integration = ShellIntegration::default();\n        assert!(integration.osc_sequences);\n        assert!(integration.prompt_detection);\n        assert!(integration.directory_tracking);\n        assert!(integration.command_tracking);\n        assert!(integration.current_dir.is_none());\n        assert!(integration.last_command.is_none());\n    }\n}\n","traces":[{"line":95,"address":[7056651,7056416],"length":1,"stats":{"Line":4}},{"line":101,"address":[6353173,6352885],"length":1,"stats":{"Line":4}},{"line":102,"address":[6353178,6352890],"length":1,"stats":{"Line":4}},{"line":106,"address":[5530768],"length":1,"stats":{"Line":4}},{"line":108,"address":[6349249],"length":1,"stats":{"Line":4}},{"line":109,"address":[7052956],"length":1,"stats":{"Line":4}},{"line":116,"address":[6349340],"length":1,"stats":{"Line":4}},{"line":117,"address":[7053039],"length":1,"stats":{"Line":4}},{"line":120,"address":[5530954],"length":1,"stats":{"Line":4}},{"line":121,"address":[5530994],"length":1,"stats":{"Line":4}},{"line":122,"address":[7053165],"length":1,"stats":{"Line":4}},{"line":125,"address":[7053205],"length":1,"stats":{"Line":4}},{"line":126,"address":[5531117],"length":1,"stats":{"Line":4}},{"line":127,"address":[6417161],"length":1,"stats": "lib.rs"],"content":"//! Furnace - A high-performance terminal emulator\n//!\n//! This library provides the core functionality for the Furnace terminal emulator,\n//! including terminal rendering, shell integration, and various UI components.\n//!\n//! # Features\n//!\n//! - **High Performance**: Zero-copy rendering with dirty tracking for 170 FPS\n//! - **Memory Safety**: 100% safe Rust with comprehensive error handling\n//! - **Async I/O**: Non-blocking shell I/O using Tokio for responsiveness\n//! - **True Color**: Full 24-bit RGB color support with ANSI parsing\n//! - **GPU Acceleration**: Optional hardware-accelerated rendering via wgpu\n//! - **Cross-Platform**: Primarily Windows-focused with portable PTY support\n//!\n//! # Architecture\n//!\n//! The codebase is organized into focused modules with clear separation of concerns:\n//!\n//! - [`config`]: Configuration management with Lua scripting support\n//! - [`terminal`]: Main terminal logic and async event loop\n//! - [`shell`]: PTY and shell session management with zero-copy I/O\n//! - [`ui`]: UI components (command palette, resource monitor, themes)\n//! - [`session`]: Session save/restore functionality for workflow persistence\n//! - [`keybindings`]: Extensible keyboard shortcut handling\n//! - [`colors`]: 24-bit true color support with blending operations\n//! - [`progress_bar`]: Command execution progress tracking with spinner\n//! - [`gpu`]: GPU-accelerated rendering (optional, requires `gpu` feature)\n//!\n//! # Performance Considerations\n//!\n//! This codebase is optimized for performance:\n//!\n//! - **Zero-copy operations**: Borrowed strings and slices used throughout\n//! - **Dirty tracking**: Renders only when state changes\n//! - **Buffer reuse**: Pre-allocated buffers for I/O operations\n//! - **Cache invalidation**: Smart cache management for styled text\n//! - **Efficient string handling**: Uses `Arc\u003cstr\u003e` for shared strings\n//!\n//! # Safety\n//!\n//! This codebase contains no `unsafe` code blocks. All operations are\n//! guaranteed memory-safe by the Rust compiler.\n\npub mod colors;\npub mod config;\npub mod hooks;\npub mod keybindings;\npub mod progress_bar;\npub mod session;\npub mod shell;\npub mod terminal;\npub mod ui;\n\n/// GPU-accelerated rendering module\n///\n/// Enabled with the `gpu` feature flag. Provides hardware-accelerated\n/// text rendering using wgpu for 170+ FPS performance.\n#[cfg(feature = \"gpu\")]\npub mod gpu;\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","furnace","src","main.rs"],"content":"use anyhow::{Context, Result};\nuse clap::Parser;\nuse std::io::IsTerminal;\nuse tracing::Level;\nuse tracing_subscriber::FmtSubscriber;\n\nmod colors;\nmod config;\n#[cfg(feature = \"gpu\")]\nmod gpu;\nmod hooks;\nmod keybindings;\nmod progress_bar;\nmod session;\nmod shell;\nmod terminal;\nmod ui;\n\nuse config::Config;\nuse terminal::Terminal;\n\n/// Furnace - An extremely advanced, high-performance terminal emulator for Windows\n#[derive(Parser, Debug)]\n#[command(author, version, about, long_about = None)]\nstruct Args {\n    /// Path to configuration file\n    #[arg(short, long)]\n    config: Option\u003cString\u003e,\n\n    /// Enable debug logging\n    #[arg(short, long)]\n    debug: bool,\n\n    /// Shell command to execute\n    #[arg(short, long)]\n    shell: Option\u003cString\u003e,\n}\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c()\u003e {\n    let args = Args::parse();\n\n    // Initialize logging to stderr instead of stdout\n    // This prevents log messages from appearing in the terminal UI\n    // Only show logs in debug mode, otherwise disable logging\n    let log_level = if args.debug {\n        Level::DEBUG\n    } else {\n        Level::ERROR // Only show errors in normal mode, not INFO logs\n    };\n\n    let subscriber = FmtSubscriber::builder()\n        .with_max_level(log_level)\n        .with_writer(std::io::stderr) // Write to stderr, not stdout\n        .finish();\n\n    tracing::subscriber::set_global_default(subscriber)\n        .context(\"Failed to set global default subscriber\")?;\n\n    // Load configuration\n    let config = if let Some(config_path) = args.config {\n        Config::load_from_file(\u0026config_path)?\n    } else {\n        Config::load_default()?\n    };\n\n    // Override shell if specified\n    let mut config = config;\n    if let Some(shell) = args.shell {\n        config.shell.default_shell = shell;\n    }\n\n    // Check if hardware acceleration is enabled\n    #[cfg(feature = \"gpu\")]\n    let using_gpu = config.terminal.hardware_acceleration;\n    #[cfg(not(feature = \"gpu\"))]\n    let using_gpu = false;\n\n    // Only check for TTY if using CPU rendering (ratatui)\n    // GPU rendering uses a windowed application and doesn't need TTY\n    if !using_gpu \u0026\u0026 !std::io::stdout().is_terminal() {\n        eprintln!(\"Error: Furnace CPU rendering mode must be run in an interactive terminal.\");\n        eprintln!(\"It cannot be run with redirected output or in non-TTY environments.\");\n        eprintln!(\"\\nUsage: Run 'furnace' directly in a terminal emulator.\");\n        eprintln!(\"Tip: Enable GPU rendering with 'terminal.hardware_acceleration = true' to run in windowed mode.\");\n        std::process::exit(1);\n    }\n\n    // Create and run terminal\n    let mut terminal = Terminal::new(config)?;\n    // Run terminal with better error context\n    if let Err(e) = terminal.run().await {\n        // Ensure terminal is cleaned up before showing error\n        eprintln!(\"\\nFurnace encountered an error: {}\", e);\n        eprintln!(\"\\nIf the terminal display is corrupted, try running:\");\n        eprintln!(\"  reset\");\n        return Err(e);\n    }\n\n    Ok(())\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","workspaces","furnace","src","progress_bar.rs"],"content":"//! Command Progress Bar\n//!\n//! Tracks and displays progress of running commands in the terminal.\n//!\n//! # Features\n//! - Visual progress indicator for long-running commands\n//! - Spinner animation while command is executing\n//! - Elapsed time display\n//! - Command name display\n\nuse std::time::{Duration, Instant};\n\n/// Progress bar state for tracking command execution\n#[derive(Debug, Clone)]\npub struct ProgressBar {\n    /// Whether progress bar is currently visible\n    pub visible: bool,\n    /// Command being executed (stored without allocation when possible)\n    command: String,\n    /// When the command started\n    start_time: Option\u003cInstant\u003e,\n    /// Current spinner frame (for animation)\n    spinner_frame: usize,\n    /// Cached elapsed seconds to avoid repeated formatting (Bug #17)\n    cached_elapsed_secs: u64,\n}\n\n/// Bug #15: ASCII spinner characters that work on all terminals including Windows Conhost\nconst SPINNER_CHARS: \u0026[char] = \u0026['|', '/', '-', '\\\\'];\n\nimpl ProgressBar {\n    /// Create a new progress bar\n    #[must_use]\n    pub fn new() -\u003e Self {\n        Self {\n            visible: false,\n            command: String::new(),\n            start_time: None,\n            spinner_frame: 0,\n            cached_elapsed_secs: 0,\n        }\n    }\n\n    /// Start tracking a command (Bug #24: takes \u0026str to avoid clone)\n    pub fn start_ref(\u0026mut self, command: \u0026str) {\n        self.visible = true;\n        self.command.clear();\n        self.command.push_str(command);\n        self.start_time = Some(Instant::now());\n        self.spinner_frame = 0;\n        self.cached_elapsed_secs = 0;\n    }\n\n    /// Start tracking a command (legacy API, takes ownership)\n    pub fn start(\u0026mut self, command: String) {\n        self.visible = true;\n        self.command = command;\n        self.start_time = Some(Instant::now());\n        self.spinner_frame = 0;\n        self.cached_elapsed_secs = 0;\n    }\n\n    /// Stop tracking and hide progress bar\n    pub fn stop(\u0026mut self) {\n        self.visible = false;\n        self.command.clear();\n        self.start_time = None;\n        self.spinner_frame = 0;\n        self.cached_elapsed_secs = 0;\n    }\n\n    /// Update spinner animation\n    pub fn tick(\u0026mut self) {\n        if self.visible {\n            self.spinner_frame = (self.spinner_frame + 1) % SPINNER_CHARS.len();\n            // Update cached elapsed time\n            if let Some(start) = self.start_time {\n                self.cached_elapsed_secs = start.elapsed().as_secs();\n            }\n        }\n    }\n\n    /// Get current spinner character (Bug #15: ASCII-safe)\n    #[must_use]\n    pub fn spinner_char(\u0026self) -\u003e char {\n        SPINNER_CHARS[self.spinner_frame]\n    }\n\n    /// Get elapsed time as formatted string (Bug #17: uses cached value)\n    #[must_use]\n    pub fn elapsed(\u0026self) -\u003e String {\n        format_duration_secs(self.cached_elapsed_secs)\n    }\n\n    /// Get display text for progress bar\n    #[must_use]\n    pub fn display_text(\u0026self) -\u003e String {\n        if self.visible {\n            format!(\n                \"{} Running: {} ({})\",\n                self.spinner_char(),\n                self.command,\n                self.elapsed()\n            )\n        } else {\n            String::new()\n        }\n    }\n\n    /// Bug #16: Get display text with truncated command\n    ///\n    /// This function safely handles UTF-8 strings by truncating at character\n    /// boundaries rather than byte boundaries, preventing panics on multi-byte\n    /// characters.\n    #[must_use]\n    pub fn display_text_truncated(\u0026self, max_cmd_len: usize) -\u003e String {\n        if self.visible {\n            // Count characters (not bytes) to safely handle UTF-8\n            let char_count = self.command.chars().count();\n            if char_count \u003e max_cmd_len {\n                // Safely truncate at character boundary\n                let truncate_len = max_cmd_len.saturating_sub(3);\n                let truncated: String = self.command.chars().take(truncate_len).collect();\n                format!(\n                    \"{} Running: {}... ({})\",\n                    self.spinner_char(),\n                    truncated,\n                    self.elapsed()\n                )\n            } else {\n                format!(\n                    \"{} Running: {} ({})\",\n                    self.spinner_char(),\n                    \u0026self.command,\n                    self.elapsed()\n                )\n            }\n        } else {\n            String::new()\n        }\n    }\n\n    /// Get the command being tracked\n    #[must_use]\n    pub fn command(\u0026self) -\u003e \u0026str {\n        \u0026self.command\n    }\n}\n\nimpl Default for ProgressBar {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Format duration for display (Bug #17: takes seconds directly to avoid allocation)\nfn format_duration_secs(secs: u64) -\u003e String {\n    if secs \u003c 60 {\n        format!(\"{secs}s\")\n    } else if secs \u003c 3600 {\n        let minutes = secs / 60;\n        let seconds = secs % 60;\n        format!(\"{minutes}m {seconds}s\")\n    } else {\n        let hours = secs / 3600;\n        let minutes = (secs % 3600) / 60;\n        format!(\"{hours}h {minutes}m\")\n    }\n}\n\n/// Format duration for display (legacy API - kept for future use)\n#[must_use]\npub fn _format_duration(duration: Duration) -\u003e String {\n    format_duration_secs(duration.as_secs())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_progress_bar_start_stop() {\n        let mut pb = ProgressBar::new();\n        assert!(!pb.visible);\n\n        pb.start(\"ls -la\".to_string());\n        assert!(pb.visible);\n        assert_eq!(pb.command(), \"ls -la\");\n        assert!(pb.start_time.is_some());\n\n        pb.stop();\n        assert!(!pb.visible);\n        assert!(pb.command().is_empty());\n        assert!(pb.start_time.is_none());\n    }\n\n    #[test]\n    fn test_progress_bar_start_ref() {\n        let mut pb = ProgressBar::new();\n        pb.start_ref(\"git status\");\n        assert!(pb.visible);\n        assert_eq!(pb.command(), \"git status\");\n    }\n\n    #[test]\n    fn test_spinner_animation() {\n        let mut pb = ProgressBar::new();\n        pb.start(\"test\".to_string());\n\n        let first_char = pb.spinner_char();\n        pb.tick();\n        let second_char = pb.spinner_char();\n\n        assert_ne!(first_char, second_char);\n    }\n\n    #[test]\n    fn test_spinner_is_ascii() {\n        // Bug #15: Ensure all spinner chars are basic ASCII\n        for c in SPINNER_CHARS {\n            assert!(c.is_ascii(), \"Spinner char '{c}' is not ASCII\");\n        }\n    }\n\n    #[test]\n    fn test_format_duration() {\n        assert_eq!(_format_duration(Duration::from_secs(30)), \"30s\");\n        assert_eq!(_format_duration(Duration::from_secs(90)), \"1m 30s\");\n        assert_eq!(_format_duration(Duration::from_secs(3661)), \"1h 1m\");\n    }\n\n    #[test]\n    fn test_truncated_display() {\n        let mut pb = ProgressBar::new();\n        pb.start(\"very-long-command-that-should-be-truncated\".to_string());\n\n        let text = pb.display_text_truncated(10);\n        assert!(text.contains(\"very-lo...\"));\n    }\n\n    #[test]\n    fn test_truncated_display_utf8() {\n        // Test with multi-byte UTF-8 characters (emoji, Chinese, etc.)\n        let mut pb = ProgressBar::new();\n        pb.start(\"🔥火炉🔥command\".to_string());\n\n        // Should not panic on UTF-8 strings\n        let text = pb.display_text_truncated(5);\n        assert!(!text.is_empty());\n        // Verify it truncates at character boundary, not byte boundary\n        assert!(text.contains(\"...\"));\n    }\n\n    #[test]\n    fn test_default_implementation() {\n        let pb = ProgressBar::default();\n        assert!(!pb.visible);\n        assert!(pb.command().is_empty());\n    }\n\n    #[test]\n    fn test_display_text_not_visible() {\n        let pb = ProgressBar::new();\n        let text = pb.display_text();\n        assert!(text.is_empty());\n    }\n\n    #[test]\n    fn test_display_text_visible() {\n        let mut pb = ProgressBar::new();\n        pb.start(\"test\".to_string());\n        let text = pb.display_text();\n        assert!(text.contains(\"Running:\"));\n        assert!(text.contains(\"test\"));\n    }\n\n    #[test]\n    fn test_display_text_truncated_not_visible() {\n        let pb = ProgressBar::new();\n        let text = pb.display_text_truncated(10);\n        assert!(text.is_empty());\n    }\n\n    #[test]\n    fn test_display_text_truncated_short_command() {\n        let mut pb = ProgressBar::new();\n        pb.start(\"ls\".to_string());\n        let text = pb.display_text_truncated(100);\n        // Should not be truncated\n        assert!(!text.contains(\"...\"));\n        assert!(text.contains(\"ls\"));\n    }\n\n    #[test]\n    fn test_elapsed_after_tick() {\n        let mut pb = ProgressBar::new();\n        pb.start(\"test\".to_string());\n        pb.tick();\n        let elapsed = pb.elapsed();\n        // Should be 0s immediately after start\n        assert!(elapsed.contains('s'));\n    }\n\n    #[test]\n    fn test_spinner_cycles() {\n        let mut pb = ProgressBar::new();\n        pb.start(\"test\".to_string());\n\n        // Cycle through all spinner characters\n        let mut seen = std::collections::HashSet::new();\n        for _ in 0..10 {\n            seen.insert(pb.spinner_char());\n            pb.tick();\n        }\n\n        // Should have seen all spinner chars\n        assert_eq!(seen.len(), SPINNER_CHARS.len());\n    }\n\n    #[test]\n    fn test_format_duration_secs_edge_cases() {\n        // Test 0 seconds\n        assert_eq!(format_duration_secs(0), \"0s\");\n\n        // Test exactly 60 seconds\n        assert_eq!(format_duration_secs(60), \"1m 0s\");\n\n        // Test exactly 1 hour\n        assert_eq!(format_duration_secs(3600), \"1h 0m\");\n\n        // Test large values\n        assert_eq!(format_duration_secs(7261), \"2h 1m\");\n    }\n\n    #[test]\n    fn test_tick_when_not_visible() {\n        let mut pb = ProgressBar::new();\n        // Tick should be a no-op when not visible\n        pb.tick();\n        assert_eq!(pb.spinner_frame, 0);\n    }\n}\n","traces":[{"line":34,"address":[6476880],"length":1,"stats":{"Line":1}},{"line":45,"address":[7421840],"length":1,"stats":{"Line":0}},{"line":46,"address":[7414723],"length":1,"stats":{"Line":2}},{"line":49,"address":[6477418],"length":1,"stats":{"Line":2}},{"line":51,"address":[6563836],"length":1,"stats":{"Line":2}},{"line":55,"address":[6115315,6110856],"length":1,"stats":{"Line":1}},{"line":56,"address":[6176657],"length":1,"stats":{"Line":17}},{"line":57,"address":[7415705,7410830,7416562,7418950,7414370,7415975,7413072,7412102,7418463,7413614,7415320,7412810,7410158,7412380,7411728,7413888],"length":1,"stats":{"Line":17}},{"line":58,"address":[5998003],"length":1,"stats":{"Line":17}},{"line":60,"address":[6176726],"length":1,"stats":{"Line":17}},{"line":64,"address":[6544736],"length":1,"stats":{"Line":1}},{"line":65,"address":[6544740],"length":1,"stats":{"Line":3}},{"line":67,"address":[7135519],"length":1,"stats":{"Line":3}},{"line":69,"address":[7416167],"length":1,"stats":{"Line":3}},{"line":73,"address":[6476992],"length":1,"stats":{"Line":0}},{"line":74,"address":[6109089,6111853,6110516],"length":1,"stats":{"Line":6}},{"line":75,"address":[6665711,6668294],"length":1,"stats":{"Line":6}},{"line":77,"address":[7421518],"length":1,"stats":{"Line":8}},{"line":78,"address":[6110546,6111899,6109157],"length":1,"stats":{"Line":6}},{"line":86,"address":[6110557,6110776,6109494,6109062],"length":1,"stats":{"Line":10}},{"line":91,"address":[6477312],"length":1,"stats":{"Line":0}},{"line":92,"address":[7420117,7420583,7420902,7421812],"length":1,"stats":{"Line":8}},{"line":97,"address":[5464544,5464884],"length": g,\n    pub name: String,\n    pub created_at: DateTime\u003cLocal\u003e,\n    pub tabs: Vec\u003cTabState\u003e,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TabState {\n    pub output: String,\n    pub working_dir: Option\u003cString\u003e,\n    pub active: bool,\n}\n\nimpl SessionManager {\n    /// Create a new session manager\n    ///\n    /// # Errors\n    /// Returns an error if the home directory cannot be determined or the sessions directory cannot be created\n    pub fn new() -\u003e Result\u003cSelf\u003e {\n        let home = dirs::home_dir().context(\"Failed to get home directory\")?;\n\n        let sessions_dir = home.join(\".furnace\").join(\"sessions\");\n        fs::create_dir_all(\u0026sessions_dir).context(\"Failed to create sessions directory\")?;\n\n        Ok(Self { sessions_dir })\n    }\n\n    /// Save a session\n    ///\n    /// # Errors\n    /// Returns an error if:\n    /// - JSON serialization fails\n    /// - The session file cannot be written\n    pub fn save_session(\u0026self, session: \u0026SavedSession) -\u003e Result\u003c()\u003e {\n        let session_file = self.sessions_dir.join(format!(\"{}.json\", session.id));\n        let json = serde_json::to_string_pretty(session).context(\"Failed to serialize session\")?;\n\n        fs::write(\u0026session_file, json).context(\"Failed to write session file\")?;\n\n        Ok(())\n    }\n\n    /// Load a session by ID\n    ///\n    /// # Errors\n    /// Returns an error if:\n    /// - The session file doesn't exist\n    /// - The file cannot be read\n    /// - JSON deserialization fails\n    pub fn load_session(\u0026self, id: \u0026str) -\u003e Result\u003cSavedSession\u003e {\n        let session_file = self.sessions_dir.join(format!(\"{id}.json\"));\n        let json = fs::read_to_string(\u0026session_file).context(\"Failed to read session file\")?;\n\n        let session: SavedSession =\n            serde_json::from_str(\u0026json).context(\"Failed to parse session file\")?;\n\n        Ok(session)\n    }\n\n    /// List all saved sessions\n    ///\n    /// # Errors\n    /// Returns an error if the sessions directory cannot be read\n    pub fn list_sessions(\u0026self) -\u003e Result\u003cVec\u003cSavedSession\u003e\u003e {\n        let mut sessions = Vec::new();\n\n        for entry in fs::read_dir(\u0026self.sessions_dir)? {\n            let entry = entry?;\n            let path = entry.path();\n\n            if path.extension().and_then(|s| s.to_str()) == Some(\"json\") {\n                if let Ok(json) = fs::read_to_string(\u0026path) {\n                    if let Ok(session) = serde_json::from_str::\u003cSavedSession\u003e(\u0026json) {\n                        sessions.push(session);\n                    }\n                }\n            }\n        }\n\n        // Sort by creation date (most recent first)\n        sessions.sort_by(|a, b| b.created_at.cmp(\u0026a.created_at));\n\n        Ok(sessions)\n    }\n\n    /// Delete a session\n    ///\n    /// # Errors\n    /// Returns an error if the session file cannot be deleted\n    pub fn delete_session(\u0026self, id: \u0026str) -\u003e Result\u003c()\u003e {\n        let session_file = self.sessions_dir.join(format!(\"{id}.json\"));\n        fs::remove_file(\u0026session_file).context(\"Failed to delete session file\")?;\n\n        Ok(())\n    }\n\n    /// Get sessions directory path\n    #[must_use]\n    pub fn sessions_dir(\u0026self) -\u003e \u0026Path {\n        \u0026self.sessions_dir\n    }\n}\n\nimpl Default for SessionManager {\n    /// Create a default session manager\n    ///\n    /// If the home directory cannot be determined, falls back to using\n    /// the system's temporary directory.\n    fn default() -\u003e Self {\n        // Try to create with graceful fallback\n        if let Ok(manager) = Self::new() {\n            manager\n        } else {\n            // Fallback: use temp directory if home is unavailable\n            let sessions_dir = std::env::temp_dir().join(\"furnace_sessions\");\n            let _ = std::fs::create_dir_all(\u0026sessions_dir);\n            Self { sessions_dir }\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_session_manager_creation() {\n        let manager = SessionManager::new();\n        assert!(manager.is_ok());\n    }\n\n    #[test]\n    fn test_save_and_load_session() {\n        let manager = SessionManager::new().unwrap();\n\n        let session = SavedSession {\n            id: \"test-session\".to_string(),\n            name: \"Test Session\".to_string(),\n            created_at: Local::now(),\n            tabs: vec![TabState {\n                output: \"test output\".to_string(),\n                working_dir: Some(\"/home/user\".to_string()),\n                active: true,\n            }],\n        };\n\n        manager.save_session(\u0026session).unwrap();\n        let loaded = manager.load_session(\"test-session\").unwrap();\n\n        assert_eq!(loaded.id, session.id);\n        assert_eq!(loaded.name, session.name);\n        assert_eq!(loaded.tabs.len(), 1);\n\n        // Cleanup\n        manager.delete_session(\"test-session\").ok();\n    }\n\n    #[test]\n    fn test_list_sessions() {\n        let manager = SessionManager::new().unwrap();\n\n        // Create a test session\n        let session = SavedSession {\n            id: \"list-test-session\".to_string(),\n            name: \"List Test\".to_string(),\n            created_at: Local::now(),\n            tabs: vec![TabState {\n                output: \"test\".to_string(),\n                working_dir: None,\n                active: true,\n            }],\n        };\n\n        manager.save_session(\u0026session).unwrap();\n\n        // List should include our session\n        let sessions = manager.list_sessions().unwrap();\n        assert!(sessions.iter().any(|s| s.id == \"list-test-session\"));\n\n        // Cleanup\n        manager.delete_session(\"list-test-session\").ok();\n    }\n\n    #[test]\n    fn test_delete_session() {\n        let manager = SessionManager::new().unwrap();\n\n        let session = SavedSession {\n            id: \"delete-test\".to_string(),\n            name: \"Delete Test\".to_string(),\n            created_at: Local::now(),\n            tabs: vec![],\n        };\n\n        manager.save_session(\u0026session).unwrap();\n        assert!(manager.load_session(\"delete-test\").is_ok());\n\n        manager.delete_session(\"delete-test\").unwrap();\n        assert!(manager.load_session(\"delete-test\").is_err());\n    }\n\n    #[test]\n    fn test_sessions_dir() {\n        let manager = SessionManager::new().unwrap();\n        let dir = manager.sessions_dir();\n        assert!(dir.exists());\n    }\n\n    #[test]\n    fn test_default_implementation() {\n        let manager = SessionManager::default();\n        assert!(manager.sessions_dir().exists());\n    }\n\n    #[test]\n    fn test_session_with_multiple_tabs() {\n        let manager = SessionManager::new().unwrap();\n\n        let session = SavedSession {\n            id: \"multi-tab-test\".to_string(),\n            name: \"Multi Tab Test\".to_string(),\n            created_at: Local::now(),\n            tabs: vec![\n                TabState {\n                    output: \"tab1 output\".to_string(),\n                    working_dir: Some(\"/home/user\".to_string()),\n                    active: false,\n                },\n                TabState {\n                    output: \"tab2 output\".to_string(),\n                    working_dir: Some(\"/tmp\".to_string()),\n                    active: true,\n                },\n                TabState {\n                    output: \"tab3 output\".to_string(),\n                    working_dir: None,\n                    active: false,\n                },\n            ],\n        };\n\n        manager.save_session(\u0026session).unwrap();\n        let loaded = manager.load_session(\"multi-tab-test\").unwrap();\n\n        assert_eq!(loaded.tabs.len(), 3);\n        assert!(!loaded.tabs[0].active);\n        assert!(loaded.tabs[1].active);\n        assert_eq!(loaded.tabs[1].working_dir, Some(\"/tmp\".to_string()));\n\n        // Cleanup\n        manager.delete_session(\"multi-tab-test\").ok();\n    }\n\n    #[test]\n    fn test_load_nonexistent_session() {\n        let manager = SessionManager::new().unwrap();\n        let result = manager.load_session(\"nonexistent-session-id\");\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_session_with_special_characters() {\n        let manager = SessionManager::new().unwrap();\n\n        let session = SavedSession {\n            id: \"special-chars-test\".to_string(),\n            name: \"Test with \\\"quotes\\\" and \\\\ backslash\".to_string(),\n            created_at: Local::now(),\n            tabs: vec![TabState {\n                output: \"output with\\nnewlines\\tand\\ttabs\".to_string(),\n                working_dir: Some(\"/path/with spaces/and'quotes\".to_string()),\n                active: true,\n            }],\n        };\n\n        manager.save_session(\u0026session).unwrap();\n        let loaded = manager.load_session(\"special-chars-test\").unwrap();\n\n        assert_eq!(loaded.name, session.name);\n        assert!(loaded.tabs[0].output.contains('\\n'));\n        assert!(loaded.tabs[0].output.contains('\\t'));\n\n        // Cleanup\n        manager.delete_session(\"special-chars-test\").ok();\n    }\n}\n","traces":[{"line":32,"address":[5832864,5833691],"length":1,"stats":{"Line":3}},{"line":33,"address":[5832932,5832897,5832997],"length":1,"stats":{"Line":8}},{"line":35,"address":[5833616],"length":1,"stats":{"Line":0}},{"line":36,"address":[7006912,7006967,7006798],"length":1,"stats":{"Line":8}},{"line":38,"address":[5833342],"length":1,"stats":{"Line":4}},{"line":47,"address":[5829712,5830454],"length":1,"stats":{"Line":2}},{"line":48,"address":[6209149],"length":1,"stats":{"Line":2}},{"line":4 _pty::MasterPty + Send\u003e\u003e\u003e,\n    reader: Arc\u003cMutex\u003cBox\u003cdyn Read + Send\u003e\u003e\u003e,\n    writer: Arc\u003cMutex\u003cBox\u003cdyn Write + Send\u003e\u003e\u003e,\n}\n\nimpl ShellSession {\n    /// Create a new shell session with optimal buffer sizes\n    ///\n    /// This is a convenience wrapper around `new_with_env` with no environment variables.\n    /// Provided for backward compatibility and simpler use cases.\n    ///\n    /// # Errors\n    /// Returns an error if PTY creation or shell process spawn fails\n    pub fn new(shell_cmd: \u0026str, working_dir: Option\u003c\u0026str\u003e, rows: u16, cols: u16) -\u003e Result\u003cSelf\u003e {\n        Self::new_with_env(shell_cmd, working_dir, rows, cols, \u0026[])\n    }\n\n    /// Create a new shell session with environment variables\n    ///\n    /// # Arguments\n    /// * `shell_cmd` - Shell command to execute\n    /// * `working_dir` - Optional working directory\n    /// * `rows` - Number of terminal rows\n    /// * `cols` - Number of terminal columns\n    /// * `env_vars` - Environment variables as (key, value) tuples\n    ///\n    /// # Errors\n    /// Returns an error if PTY creation or shell process spawn fails\n    pub fn new_with_env(\n        shell_cmd: \u0026str,\n        working_dir: Option\u003c\u0026str\u003e,\n        rows: u16,\n        cols: u16,\n        env_vars: \u0026[(\u0026str, \u0026str)],\n    ) -\u003e Result\u003cSelf\u003e {\n        let pty_system = NativePtySystem::default();\n\n        let pty_size = PtySize {\n            rows,\n            cols,\n            pixel_width: 0,\n            pixel_height: 0,\n        };\n\n        let pair = pty_system.openpty(pty_size).context(\"Failed to open PTY\")?;\n\n        let mut cmd = CommandBuilder::new(shell_cmd);\n\n        if let Some(dir) = working_dir {\n            cmd.cwd(dir);\n        }\n\n        // Set environment variables\n        for (key, value) in env_vars {\n            cmd.env(key, value);\n        }\n\n        let _child = pair\n            .slave\n            .spawn_command(cmd)\n            .context(\"Failed to spawn shell\")?;\n\n        info!(\"Shell session started: {}\", shell_cmd);\n        debug!(\"PTY size: {}x{}\", rows, cols);\n\n        let reader = pair\n            .master\n            .try_clone_reader()\n            .context(\"Failed to clone reader\")?;\n        let writer = pair.master.take_writer().context(\"Failed to take writer\")?;\n\n        Ok(Self {\n            pty: Arc::new(Mutex::new(pair.master)),\n            reader: Arc::new(Mutex::new(reader)),\n            writer: Arc::new(Mutex::new(writer)),\n        })\n    }\n\n    /// Read output from shell (non-blocking, high-performance)\n    ///\n    /// This method uses `spawn_blocking` to avoid blocking the async runtime during\n    /// synchronous I/O operations. The data is read into a temporary buffer in the\n    /// blocking thread and then copied to the caller's buffer.\n    ///\n    /// # Errors\n    /// Returns an error if the read operation fails or the task cannot be spawned\n    pub async fn read_output(\u0026self, buffer: \u0026mut [u8]) -\u003e Result\u003cusize\u003e {\n        let reader = self.reader.clone();\n        let buffer_len = buffer.len();\n\n        // Spawn blocking task to perform synchronous read without blocking async runtime\n        let data = tokio::task::spawn_blocking(move || -\u003e Result\u003cVec\u003cu8\u003e\u003e {\n            let mut reader = reader.blocking_lock();\n            let mut temp = vec![0u8; buffer_len];\n            match reader.read(\u0026mut temp) {\n                Ok(n) =\u003e {\n                    temp.truncate(n); // Only keep the bytes we actually read\n                    Ok(temp)\n                }\n                Err(e) if e.kind() == std::io::ErrorKind::WouldBlock =\u003e Ok(Vec::new()),\n                Err(e) =\u003e Err(anyhow::Error::from(e)),\n            }\n        })\n        .await\n        .context(\"Task join error\")??;\n\n        // Copy data to caller's buffer\n        let n = data.len();\n        if n \u003e 0 {\n            buffer[..n].copy_from_slice(\u0026data);\n        }\n        Ok(n)\n    }\n\n    /// Write input to shell with minimal latency\n    ///\n    /// This function writes data to the shell and immediately flushes to ensure\n    /// low latency. This is critical for interactive terminal responsiveness.\n    ///\n    /// # Arguments\n    /// * `data` - Bytes to write to the shell (typically user input or commands)\n    ///\n    /// # Returns\n    /// Number of bytes written on success\n    ///\n    /// # Errors\n    /// Returns an error if:\n    /// - The write operation fails (e.g., shell terminated)\n    /// - The flush operation fails (e.g., broken pipe)\n    pub async fn write_input(\u0026self, data: \u0026[u8]) -\u003e Result\u003cusize\u003e {\n        // BUG FIX #2: Use spawn_blocking for sync I/O to avoid blocking the async runtime\n        let writer = self.writer.clone();\n        let data = data.to_vec();\n        let len = data.len();\n\n        tokio::task::spawn_blocking(move || {\n            let mut writer = writer.blocking_lock();\n            writer.write_all(\u0026data)?;\n            writer.flush()?;\n            Ok::\u003c_, anyhow::Error\u003e(len)\n        })\n        .await\n        .context(\"Task join error\")?\n        .context(format!(\"Failed to write {} bytes to shell\", len))?;\n\n        debug!(\"Wrote {} bytes to shell\", len);\n        Ok(len)\n    }\n\n    /// Resize the PTY to match terminal dimensions\n    ///\n    /// This function must be called when the terminal window is resized to ensure\n    /// proper text wrapping and display. Without resizing, the shell will not know\n    /// the actual terminal dimensions and may produce incorrectly wrapped output.\n    ///\n    /// # Arguments\n    /// * `rows` - New number of rows (lines)\n    /// * `cols` - New number of columns (characters per line)\n    ///\n    /// # Errors\n    /// Returns an error if the PTY resize operation fails (e.g., invalid dimensions)\n    pub async fn resize(\u0026self, rows: u16, cols: u16) -\u003e Result\u003c()\u003e {\n        let pty = self.pty.lock().await;\n\n        pty.resize(PtySize {\n            rows,\n            cols,\n            pixel_width: 0,\n            pixel_height: 0,\n        })\n        .context(format!(\"Failed to resize PTY to {rows}x{cols}\"))?;\n\n        debug!(\"Resized PTY to {}x{}\", rows, cols);\n        Ok(())\n    }\n}\n\n// Ensure proper cleanup - Rust's Drop trait guarantees no leaks\nimpl Drop for ShellSession {\n    fn drop(\u0026mut self) {\n        info!(\"Shell session terminated\");\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[tokio::test]\n    async fn test_shell_with_env_vars() {\n        let shell = if cfg!(windows) { \"cmd.exe\" } else { \"sh\" };\n\n        let env_vars = vec![(\"TEST_VAR\", \"test_value\"), (\"CUSTOM_PATH\", \"/custom\")];\n\n        let result = ShellSession::new_with_env(shell, None, 24, 80, \u0026env_vars);\n        assert!(result.is_ok(), \"Failed to create shell with env vars\");\n    }\n\n    #[tokio::test]\n    async fn test_shell_new_compatibility() {\n        // Test that new() method still works (backward compatibility)\n        let shell = if cfg!(windows) { \"cmd.exe\" } else { \"sh\" };\n\n        let result = ShellSession::new(shell, None, 24, 80);\n        assert!(result.is_ok(), \"Failed to create shell with new() method\");\n    }\n}\n","traces":[{"line":24,"address":[6614592],"length":1,"stats":{"Line":1}},{"line":25,"address":[5324273],"length":1,"stats":{"Line":3}},{"line":39,"address":[7170976,7173903],"length":1,"stats":{"Line":3}},{"line":55,"address":[6612356,6611691,6611783],"length":1,"stats":{"Line":10}},{"line":57,"address":[6544021],"length":1,"stats":{"Line":5}},{"line":59,"address":[7171184],"length":1,"stats":{"Line":5}},{"line":60,"address":[6611856],"length":1,"stats":{ quences\nconst WARN_MALFORMED_256_FG: \u0026str =\n    \"Malformed ANSI 256-color sequence: missing color index after 38;5\";\nconst WARN_MALFORMED_256_BG: \u0026str =\n    \"Malformed ANSI 256-color sequence: missing color index after 48;5\";\nconst WARN_MALFORMED_RGB_FG: \u0026str =\n    \"Malformed ANSI RGB sequence: incomplete RGB values after 38;2 (expected R;G;B)\";\nconst WARN_MALFORMED_RGB_BG: \u0026str =\n    \"Malformed ANSI RGB sequence: incomplete RGB values after 48;2 (expected R;G;B)\";\nconst WARN_UNKNOWN_EXT_FG: \u0026str = \"Unknown extended foreground color type\";\nconst WARN_UNKNOWN_EXT_BG: \u0026str = \"Unknown extended background color type\";\nconst WARN_FONT_SELECTION: \u0026str = \"Font selection SGR code not supported (codes 10-19)\";\nconst WARN_OVERLINE: \u0026str = \"Overline (SGR 53) not fully supported in current terminal backend\";\n\n/// Convert a u16 color value to u8, clamping to valid range\n/// This is marked inline to allow the compiler to optimize it away when possible\n#[inline]\n#[must_use]\n#[allow(clippy::cast_possible_truncation)] // Intentional: we clamp to 0-255\nconst fn to_color_u8(value: u16) -\u003e u8 {\n    if value \u003e 255 {\n        255\n    } else {\n        value as u8\n    }\n}\n\n/// ANSI parser that converts escape sequences to styled ratatui spans\n///\n/// This is a FULL terminal emulator with complete cursor positioning support.\n/// Implements VT100/VT220/xterm escape sequences for faithful terminal emulation.\npub struct AnsiParser {\n    /// Current style being applied\n    current_style: Style,\n    /// Accumulated text with current style\n    current_text: String,\n    /// Completed spans for the current line\n    current_line_spans: Vec\u003cSpan\u003c'static\u003e\u003e,\n    /// Completed lines\n    lines: Vec\u003cLine\u003c'static\u003e\u003e,\n    /// Color palette for mapping ANSI colors to true colors\n    /// None means use default ratatui colors\n    color_palette: Option\u003cTrueColorPalette\u003e,\n    /// Cursor position - row (0-based)\n    cursor_row: usize,\n    /// Cursor position - column (0-based)\n    cursor_col: usize,\n    /// Terminal width in columns\n    terminal_width: usize,\n    /// Terminal height in rows\n    terminal_height: usize,\n    /// Saved cursor position (for DECSC/DECRC)\n    saved_cursor_row: usize,\n    saved_cursor_col: usize,\n    /// Scroll region top (0-based, inclusive)\n    scroll_top: usize,\n    /// Scroll region bottom (0-based, inclusive)\n    scroll_bottom: usize,\n    /// Alternative screen buffer (for full-screen apps)\n    alt_screen: Vec\u003cLine\u003c'static\u003e\u003e,\n    /// Whether we're using the alternative screen\n    use_alt_screen: bool,\n    /// OSC sequence buffer\n    osc_buffer: String,\n    /// Window title\n    window_title: String,\n    /// Hyperlink URL (for OSC 8)\n    hyperlink_url: Option\u003cString\u003e,\n}\n\nimpl AnsiParser {\n    /// Create a new ANSI parser with pre-allocated capacity for better performance\n    #[must_use]\n    pub fn new() -\u003e Self {\n        Self::with_size(80, 24)\n    }\n\n    /// Create a new ANSI parser with specified terminal size\n    #[must_use]\n    pub fn with_size(width: usize, height: usize) -\u003e Self {\n        let height = height.max(1);\n        Self {\n            // BUG FIX #9: Use Color::Reset for theme support instead of hardcoded White/Black\n            current_style: Style::default().fg(Color::Reset).bg(Color::Reset),\n            current_text: String::with_capacity(256),\n            current_line_spans: Vec::with_capacity(8),\n            lines: vec![Line::from(\"\"); height],\n            color_palette: None,\n            cursor_row: 0,\n            cursor_col: 0,\n            terminal_width: width.max(1),\n            terminal_height: height,\n            saved_cursor_row: 0,\n            saved_cursor_col: 0,\n            scroll_top: 0,\n            scroll_bottom: height.saturating_sub(1),\n            alt_screen: Vec::new(),\n            use_alt_screen: false,\n            osc_buffer: String::new(),\n            window_title: String::new(),\n            hyperlink_url: None,\n        }\n    }\n\n    /// Create a new ANSI parser with a custom color palette\n    #[must_use]\n    pub fn with_palette(palette: TrueColorPalette) -\u003e Self {\n        let mut parser = Self::new();\n        parser.color_palette = Some(palette);\n        parser\n    }\n\n    /// Create a new ANSI parser with custom palette and terminal size\n    #[must_use]\n    #[allow(dead_code)] // Public API for future use\n    pub fn with_palette_and_size(palette: TrueColorPalette, width: usize, height: usize) -\u003e Self {\n        let mut parser = Self::with_size(width, height);\n        parser.color_palette = Some(palette);\n        parser\n    }\n\n    /// Parse ANSI-encoded text and return styled lines\n    ///\n    /// This function processes text containing ANSI escape sequences and converts\n    /// them into ratatui's styled text representation. It handles all common\n    /// ANSI codes including colors, text attributes, and cursor movements.\n    ///\n    /// # Arguments\n    /// * `text` - Input text with ANSI escape sequences\n    ///\n    /// # Returns\n    /// Vector of styled lines ready for rendering\n    ///\n    /// # Supported ANSI Features\n    /// - 16-color palette (8 normal + 8 bright colors)\n    /// - 256-color palette\n    /// - 24-bit RGB true color\n    /// - Text attributes: bold, italic, underline, strikethrough\n    /// - Reset codes\n    ///\n    /// # Performance\n    /// This function is highly optimized:\n    /// - Zero-copy where possible\n    /// - Uses VTE parser (Rust's fastest ANSI parser)\n    /// - Minimal allocations through buffer reuse\n    ///\n    /// # Example\n    /// ```ignore\n    /// let lines = AnsiParser::parse(\"\\x1b[31mRed text\\x1b[0m\");\n    /// ```\n    #[must_use]\n    pub fn parse(text: \u0026str) -\u003e Vec\u003cLine\u003c'static\u003e\u003e {\n        let mut parser = Parser::new();\n        let mut performer = AnsiParser::new();\n\n        // VTE 0.15 expects a slice of bytes\n        parser.advance(\u0026mut performer, text.as_bytes());\n\n        // Flush any remaining content and commit final state\n        performer.flush_text();\n        performer.commit_current_line();\n\n        // Return only the lines up to the cursor position (trim empty trailing lines)\n        let last_line = performer.cursor_row + 1;\n        performer.lines[..last_line.min(performer.lines.len())].to_vec()\n    }\n\n    /// Parse ANSI-encoded text with a custom color palette\n    ///\n    /// Same as `parse()` but uses a custom color palette for ANSI color codes.\n    /// This enables theme customization without GPU rendering.\n    ///\n    /// # Arguments\n    /// * `text` - Input text with ANSI escape sequences\n    /// * `palette` - Custom color palette for ANSI color mapping\n    ///\n    /// # Returns\n    /// Vector of styled lines ready for rendering\n    ///\n    /// # Note\n    /// The palette is cloned because AnsiParser needs to own it for the VTE parser callback.\n    /// This is a small clone (51 bytes + Vec) and only happens once per render frame.\n    #[must_use]\n    pub fn parse_with_palette(text: \u0026str, palette: \u0026TrueColorPalette) -\u003e Vec\u003cLine\u003c'static\u003e\u003e {\n        let mut parser = Parser::new();\n        let mut performer = AnsiParser::with_palette(palette.clone());\n\n        // VTE 0.15 expects a slice of bytes\n        parser.advance(\u0026mut performer, text.as_bytes());\n\n        // Flush any remaining content and commit final state\n        performer.flush_text();\n        performer.commit_current_line();\n\n        // Return only the lines up to the cursor position (trim empty trailing lines)\n        let last_line = performer.cursor_row + 1;\n        performer.lines[..last_line.min(performer.lines.len())].to_vec()\n    }\n\n    /// Flush accumulated text to a span\n    fn flush_text(\u0026mut self) {\n        if !self.current_text.is_empty() {\n            let text = std::mem::take(\u0026mut self.current_text);\n            // Note: Hyperlink URLs are tracked in self.hyperlink_url but ratatui doesn't\n            // support clickable hyperlinks natively. The URL is preserved for future use\n            // or custom rendering extensions. For now, we just create a normal styled span.\n            let span = Span::styled(text, self.current_style);\n            self.current_line_spans.push(span);\n        }\n    }\n\n    /// Get the current line, ensuring it exists\n    fn ensure_line(\u0026mut self, row: usize) {\n        while self.lines.len() \u003c= row {\n            self.lines.push(Line::from(\"\"));\n        }\n    }\n\n    /// Write text at cursor position\n    fn write_at_cursor(\u0026mut self, ch: char) {\n        // Add character to current text\n        self.current_text.push(ch);\n\n        // Calculate display width for wide characters\n        let char_width = unicode_width::UnicodeWidthChar::width(ch).unwrap_or(1);\n\n        // Advance cursor\n        self.cursor_col += char_width;\n\n        // Handle line wrap\n        if self.cursor_col \u003e= self.terminal_width {\n            self.flush_text();\n            self.move_cursor_to_line_start();\n            self.cursor_row += 1;\n            if self.cursor_row \u003e= self.terminal_height {\n                self.scroll_up(1);\n                self.cursor_row = self.terminal_height - 1;\n            }\n        }\n    }\n\n    /// Move cursor to start of current line (column 0)\n    fn move_cursor_to_line_start(\u0026mut self) {\n        self.flush_text();\n        self.ensure_line(self.cursor_row);\n\n        // Commit current line spans to the line\n        if !self.current_line_spans.is_empty() {\n            let spans = std::mem::take(\u0026mut self.current_line_spans);\n            self.lines[self.cursor_row] = Line::from(spans);\n        }\n\n        self.cursor_col = 0;\n    }\n\n    /// Move cursor down one line (with scrolling)\n    fn move_cursor_down_with_scroll(\u0026mut self) {\n        self.flush_text();\n\n        // Commit current line\n        self.commit_current_line();\n\n        self.cursor_row += 1;\n        if self.cursor_row \u003e= self.terminal_height {\n            self.scroll_up(1);\n            self.cursor_row = self.terminal_height - 1;\n        }\n        self.cursor_col = 0;\n    }\n\n    /// Commit current line spans to the lines buffer\n    fn commit_current_line(\u0026mut self) {\n        self.ensure_line(self.cursor_row);\n        if !self.current_line_spans.is_empty() {\n            let spans = std::mem::take(\u0026mut self.current_line_spans);\n            self.lines[self.cursor_row] = Line::from(spans);\n        }\n    }\n\n    /// Scroll screen up by n lines\n    fn scroll_up(\u0026mut self, n: usize) {\n        if n == 0 {\n            return;\n        }\n\n        // Use Vec operations to avoid cloning Line objects\n        // Move lines up within scroll region by rotating/draining\n        let start = self.scroll_top;\n        let end = self.scroll_bottom + 1;\n\n        if start \u003e= self.lines.len() || end \u003e self.lines.len() || start \u003e= end {\n            return;\n        }\n\n        let n = n.min(end - start);\n\n        // Remove n lines from the top of scroll region\n        let _ = self.lines.drain(start..(start + n));\n\n        // Add n blank lines at the bottom of scroll region\n        // Use resize with pre-allocated capacity for efficiency\n        let insert_pos = end - n;\n        let mut blank_lines = Vec::with_capacity(n);\n        blank_lines.resize(n, Line::from(\"\"));\n        self.lines.splice(insert_pos..insert_pos, blank_lines);\n    }\n\n    /// Scroll screen down by n lines\n    fn scroll_down(\u0026mut self, n: usize) {\n        if n == 0 {\n            return;\n        }\n\n        // Use Vec operations to avoid cloning Line objects\n        let start = self.scroll_top;\n        let end = self.scroll_bottom + 1;\n\n        if start \u003e= self.lines.len() || end \u003e self.lines.len() || start \u003e= end {\n            return;\n        }\n\n        let n = n.min(end - start);\n\n        // Remove n lines from the bottom of scroll region\n        let remove_start = end - n;\n        let _ = self.lines.drain(remove_start..end);\n\n        // Add n blank lines at the top of scroll region\n        // Use resize with pre-allocated capacity for efficiency\n        let mut blank_lines = Vec::with_capacity(n);\n        blank_lines.resize(n, Line::from(\"\"));\n        self.lines.splice(start..start, blank_lines);\n    }\n\n    /// Move cursor up n lines\n    fn cursor_up(\u0026mut self, n: usize) {\n        self.flush_text();\n        self.commit_current_line();\n        self.cursor_row = self.cursor_row.saturating_sub(n);\n    }\n\n    /// Move cursor down n lines\n    fn cursor_down(\u0026mut self, n: usize) {\n        self.flush_text();\n        self.commit_current_line();\n        self.cursor_row = (self.cursor_row + n).min(self.terminal_height - 1);\n    }\n\n    /// Move cursor forward n columns\n    fn cursor_forward(\u0026mut self, n: usize) {\n        self.flush_text();\n        self.cursor_col = (self.cursor_col + n).min(self.terminal_width - 1);\n    }\n\n    /// Move cursor backward n columns\n    fn cursor_backward(\u0026mut self, n: usize) {\n        self.flush_text();\n        self.cursor_col = self.cursor_col.saturating_sub(n);\n    }\n\n    /// Set cursor position (1-based from CSI sequence)\n    fn set_cursor_position(\u0026mut self, row: usize, col: usize) {\n        self.flush_text();\n        self.commit_current_line();\n\n        // CSI sequences are 1-based, convert to 0-based\n        self.cursor_row = row.saturating_sub(1).min(self.terminal_height - 1);\n        self.cursor_col = col.saturating_sub(1).min(self.terminal_width - 1);\n    }\n\n    /// Erase from cursor to end of line\n    fn erase_to_end_of_line(\u0026mut self) {\n        self.flush_text();\n        self.ensure_line(self.cursor_row);\n\n        // Clear current text and spans\n        self.current_text.clear();\n        self.current_line_spans.clear();\n    }\n\n    /// Erase from start of line to cursor\n    fn erase_to_start_of_line(\u0026mut self) {\n        self.flush_text();\n        self.ensure_line(self.cursor_row);\n\n        // Clear the line and reset spans\n        self.lines[self.cursor_row] = Line::from(\"\");\n        self.current_line_spans.clear();\n    }\n\n    /// Erase entire line\n    fn erase_line(\u0026mut self) {\n        self.flush_text();\n        self.ensure_line(self.cursor_row);\n\n        self.lines[self.cursor_row] = Line::from(\"\");\n        self.current_line_spans.clear();\n        self.current_text.clear();\n    }\n\n    /// Erase from cursor to end of display\n    fn erase_to_end_of_display(\u0026mut self) {\n        self.flush_text();\n        self.commit_current_line();\n\n        // Erase rest of current line\n        self.erase_to_end_of_line();\n\n        // Erase all lines below\n        for i in (self.cursor_row + 1)..self.lines.len() {\n            self.lines[i] = Line::from(\"\");\n        }\n    }\n\n    /// Erase from start of display to cursor\n    fn erase_to_start_of_display(\u0026mut self) {\n        self.flush_text();\n\n        // Erase all lines above\n        for i in 0..self.cursor_row {\n            if i \u003c self.lines.len() {\n                self.lines[i] = Line::from(\"\");\n            }\n        }\n\n        // Erase start of current line\n        self.erase_to_start_of_line();\n    }\n\n    /// Erase entire display\n    fn erase_display(\u0026mut self) {\n        self.flush_text();\n\n        // Clear all lines\n        for line in \u0026mut self.lines {\n            *line = Line::from(\"\");\n        }\n\n        self.current_line_spans.clear();\n        self.current_text.clear();\n    }\n\n    /// Insert n blank characters at cursor\n    fn insert_blank_chars(\u0026mut self, n: usize) {\n        self.flush_text();\n        let spaces = \" \".repeat(n);\n        self.current_text.push_str(\u0026spaces);\n    }\n\n    /// Delete n characters at cursor\n    fn delete_chars(\u0026mut self, n: usize) {\n        self.flush_text();\n\n        if n == 0 {\n            return;\n        }\n\n        // To properly delete characters, we need to work with the current line's content\n        // This is a simplified implementation that clears current_text\n        // A full implementation would need to reconstruct the line from spans,\n        // delete n characters at cursor position, and rebuild the spans\n        // For now, we clear the pending text which handles most common cases\n        self.current_text.clear();\n\n        // Note: Full DCH implementation would require:\n        // 1. Flatten current_line_spans to get full line text\n        // 2. Calculate actual cursor position in that text\n        // 3. Delete n characters at that position\n        // 4. Rebuild spans with correct styling\n        // This complexity is deferred as DCH is rarely used in practice\n    }\n\n    /// Insert n blank lines at cursor\n    fn insert_lines(\u0026mut self, n: usize) {\n        self.flush_text();\n        self.commit_current_line();\n\n        if n == 0 || self.cursor_row \u003e= self.lines.len() {\n            return;\n        }\n\n        // Use splice for O(n) performance instead of repeated insert operations\n        // Pre-allocate with exact capacity for better performance\n        let row = self.cursor_row;\n        let mut blank_lines = Vec::with_capacity(n);\n        blank_lines.resize(n, Line::from(\"\"));\n        self.lines.splice(row..row, blank_lines);\n\n        // Trim to terminal height\n        self.lines.truncate(self.terminal_height);\n    }\n\n    /// Delete n lines at cursor\n    fn delete_lines(\u0026mut self, n: usize) {\n        self.flush_text();\n        self.commit_current_line();\n\n        if n == 0 || self.cursor_row \u003e= self.lines.len() {\n            return;\n        }\n\n        // Use drain for O(n) performance instead of repeated remove operations\n        let row = self.cursor_row;\n        let end = (row + n).min(self.lines.len());\n        self.lines.drain(row..end);\n\n        // Pad back to terminal height using resize for efficiency\n        self.lines.resize(self.terminal_height, Line::from(\"\"));\n    }\n\n    /// Save cursor position\n    fn save_cursor(\u0026mut self) {\n        self.saved_cursor_row = self.cursor_row;\n        self.saved_cursor_col = self.cursor_col;\n    }\n\n    /// Restore cursor position\n    fn restore_cursor(\u0026mut self) {\n        self.flush_text();\n        self.commit_current_line();\n        self.cursor_row = self.saved_cursor_row.min(self.terminal_height - 1);\n        self.cursor_col = self.saved_cursor_col.min(self.terminal_width - 1);\n    }\n\n    /// Switch to alternative screen buffer\n    fn use_alt_screen_buffer(\u0026mut self) {\n        if !self.use_alt_screen {\n            self.flush_text();\n            self.commit_current_line();\n\n            // Save main screen\n            self.alt_screen = std::mem::take(\u0026mut self.lines);\n            self.lines = vec![Line::from(\"\"); self.terminal_height];\n            self.use_alt_screen = true;\n            self.cursor_row = 0;\n            self.cursor_col = 0;\n        }\n    }\n\n    /// Switch to main screen buffer\n    fn use_main_screen_buffer(\u0026mut self) {\n        if self.use_alt_screen {\n            self.flush_text();\n            self.commit_current_line();\n\n            // Restore main screen\n            self.lines = std::mem::take(\u0026mut self.alt_screen);\n            self.use_alt_screen = false;\n            self.cursor_row = 0;\n            self.cursor_col = 0;\n        }\n    }\n\n    /// Convert a standard ANSI color index (0-15) to a Color\n    /// Uses the custom palette if available, otherwise falls back to ratatui defaults\n    fn ansi_color_to_color(\u0026self, index: u8) -\u003e Color {\n        if let Some(ref palette) = self.color_palette {\n            let tc = palette.get_256(index);\n            Color::Rgb(tc.r, tc.g, tc.b)\n        } else {\n            // Fallback to ratatui's default colors\n            match index {\n                0 =\u003e Color::Black,\n                1 =\u003e Color::Red,\n                2 =\u003e Color::Green,\n                3 =\u003e Color::Yellow,\n                4 =\u003e Color::Blue,\n                5 =\u003e Color::Magenta,\n                6 =\u003e Color::Cyan,\n                7 =\u003e Color::White,\n                8 =\u003e Color::DarkGray,\n                9 =\u003e Color::LightRed,\n                10 =\u003e Color::LightGreen,\n                11 =\u003e Color::LightYellow,\n                12 =\u003e Color::LightBlue,\n                13 =\u003e Color::LightMagenta,\n                14 =\u003e Color::LightCyan,\n                15 =\u003e Color::White,\n                _ =\u003e Color::Reset,\n            }\n        }\n    }\n\n    /// Convert a 256-color index to a Color\n    /// Uses the custom palette if available, otherwise uses indexed color\n    fn indexed_color_to_color(\u0026self, index: u8) -\u003e Color {\n        if let Some(ref palette) = self.color_palette {\n            let tc = palette.get_256(index);\n            Color::Rgb(tc.r, tc.g, tc.b)\n        } else {\n            Color::Indexed(index)\n        }\n    }\n\n    /// Parse SGR (Select Graphic Rendition) parameters\n    ///\n    /// SGR codes control text styling including colors and attributes.\n    /// This function processes the numeric parameters from ANSI escape sequences\n    /// and updates the current style accordingly.\n    ///\n    /// # Arguments\n    /// * `params` - ANSI parameter list from the escape sequence\n    ///\n    /// # Supported Codes\n    /// - 0: Reset all attributes\n    /// - 1: Bold\n    /// - 2
